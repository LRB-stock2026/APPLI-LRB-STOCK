<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LRB Stock Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #d4a017; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f4f8; }
        .btn-main { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: all 0.2s; }
        .btn-main:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4">

    <div id="view-home">
        <h1 class="text-3xl font-black text-slate-800 mb-8 mt-6">LRB STOCK</h1>
        <div class="grid gap-6">
            <button onclick="startApp('GROS ŒUVRE')" class="btn-main p-10 flex flex-col items-center border-b-8 border-orange-500">
                <span class="text-5xl mb-4">🏗️</span>
                <span class="text-xl font-black text-slate-700">GROS ŒUVRE</span>
            </button>
            <button onclick="startApp('SECOND ŒUVRE')" class="btn-main p-10 flex flex-col items-center border-b-8 border-blue-500">
                <span class="text-5xl mb-4">🔨</span>
                <span class="text-xl font-black text-slate-700">SECOND ŒUVRE</span>
            </button>
        </div>
    </div>

    <div id="view-scan" class="hidden">
        <button onclick="location.reload()" class="mb-6 p-4 bg-white rounded-2xl shadow-sm font-bold text-slate-600 flex items-center">
            ← Retour
        </button>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
            <div class="w-24 h-24 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-4xl">📸</span>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Prendre une photo</h2>
            <p class="text-slate-500 mb-8">L'IA va identifier l'outil et remplir la fiche automatiquement.</p>
            <input type="file" accept="image/*" capture="camera" id="camera-input" class="hidden" onchange="handlePhoto(event)">
            <label for="camera-input" class="block w-full py-5 bg-slate-800 text-white rounded-2xl font-bold text-lg cursor-pointer active:scale-95 transition-transform">
                OUVRIR L'APPAREIL
            </label>
        </div>
    </div>

    <div id="view-result" class="hidden">
        <div id="preview-container" class="mb-6 rounded-3xl overflow-hidden shadow-lg border-4 border-white">
            <img id="item-img" class="w-full h-64 object-cover">
        </div>

        <div class="bg-white p-6 rounded-[2rem] shadow-lg">
            <div class="mb-4">
                <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block italic">Nom du produit *</label>
                <input type="text" id="res-nom" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-slate-700 border-none outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block italic">Famille</label>
                    <select id="res-famille" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-slate-600 border-none outline-none">
                        <option>OUTILLAGE</option>
                        <option>ELECTROPORTATIF</option>
                        <option>QUINCAILLERIE</option>
                        <option>CONSOMMABLES</option>
                        <option>EPI</option>
                        <option>PLOMBERIE</option>
                        <option>ELECTRICITE</option>
                        <option>MENUISERIE</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-1 block italic">Unité</label>
                    <select id="res-unite" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-slate-600 border-none outline-none">
                        <option>pièce</option>
                        <option>mètre</option>
                        <option>boite</option>
                    </select>
                </div>
            </div>

            <button onclick="finalSave()" id="btn-save" class="w-full py-5 bg-yellow-600 text-white rounded-2xl font-black text-lg shadow-lg active:scale-95 transition-transform">
                VALIDER LE STOCK
            </button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://les-renovateurs-bretons.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Garde ta clé complète ici
        const _lib = supabase.createClient(supabaseUrl, supabaseKey);

        let currentCat = "";

        function startApp(cat) {
            currentCat = cat;
            document.getElementById('view-home').classList.add('hidden');
            document.getElementById('view-scan').classList.remove('hidden');
        }

        function handlePhoto(event) {
            const file = event.target.files[0];
            if(!file) return;
            
            // Simulation de l'IA pour l'exemple (ton vrai code IA est plus long, mais gardons la structure)
            document.getElementById('item-img').src = URL.createObjectURL(file);
            document.getElementById('view-scan').classList.add('hidden');
            document.getElementById('view-result').classList.remove('hidden');
            
            // Ici, normalement, l'IA remplit "res-nom"
            document.getElementById('res-nom').value = "Chargement par l'IA...";
            setTimeout(() => { document.getElementById('res-nom').value = "Ciseau à bois"; }, 1500);
        }

        async function finalSave() {
            const btn = document.getElementById('btn-save');
            btn.innerText = "ENREGISTREMENT...";
            
            const { error } = await _lib.from('produits').insert([{
                nom: document.getElementById('res-nom').value,
                corps_detat: currentCat,
                famille: document.getElementById('res-famille').value,
                unite: document.getElementById('res-unite').value,
                quantite: 1
            }]);

            if(error) alert("Erreur: " + error.message);
            else { alert("✅ Produit enregistré !"); location.reload(); }
        }
    </script>
</body>
</html>
