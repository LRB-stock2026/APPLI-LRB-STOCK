// App
function App() {
    var userState = useState(null);
    var user = userState[0];
    var setUser = userState[1];
    var screenState = useState("home");
    var screen = screenState[0];
    var setScreen = screenState[1];
    var dataState = useState(null);
    var data = dataState[0];
    var setData = dataState[1];
    var produitsState = useState([]);
    var produits = produitsState[0];
    var setProduits = produitsState[1];
    var historyStack = useRef([]);
    
    var offlineState = useState(false);
    var offline = offlineState[0]; var setOffline = offlineState[1];
    var splashState = useState(false);
    var splashDone = splashState[0]; var setSplashDone = splashState[1];

    var loadData = useCallback(async function() {
        try {
            var p = await supaGet("produits", "order=nom.asc");
            var arr = Array.isArray(p) ? p : [];
            setProduits(arr);
            setOffline(false);
            // Mettre en cache
            try { localStorage.setItem("lrb_cache_produits", JSON.stringify(arr)); } catch(e){}
        } catch(e) {
            // Fallback cache hors-ligne
            try {
                var cached = localStorage.getItem("lrb_cache_produits");
                if(cached) { setProduits(JSON.parse(cached)); setOffline(true); }
                else { setProduits([]); }
            } catch(e2) { setProduits([]); }
        }
    }, []);
    
    useEffect(function() {
        if(user) loadData();
    }, [user, loadData]);
    
    useEffect(function() {
        var savedCode = localStorage.getItem("lrb_remembered_code");
        if(!savedCode || user) return;
        // Essai Supabase d'abord
        supaGet("utilisateurs", "code=eq." + savedCode + "&limit=1").then(function(rows) {
            if(rows && rows.length > 0 && rows[0].nom) {
                setUser({code: savedCode, name: rows[0].nom, role: rows[0].role || "chantier"});
            } else if(USERS_LOCAL[savedCode]) {
                setUser(Object.assign({code: savedCode}, USERS_LOCAL[savedCode]));
            } else {
                localStorage.removeItem("lrb_remembered_code");
            }
        }).catch(function() {
            // Supabase inaccessible → fallback local
            if(USERS_LOCAL[savedCode]) {
                setUser(Object.assign({code: savedCode}, USERS_LOCAL[savedCode]));
            }
        });
    }, []);
    
    function nav(dest, d) {
        historyStack.current.push({screen: screen, data: data});
        window.history.pushState({lrb: true, idx: historyStack.current.length}, "");
        setScreen(dest);
        setData(d);
    }
    
    function goBack() {
        if(historyStack.current.length > 0) {
            var prev = historyStack.current.pop();
            setScreen(prev.screen);
            setData(prev.data);
        } else {
            setScreen("home");
            setData(null);
        }
    }
    
    function onNav(dest) {
        historyStack.current = [];
        setData(null);
        setScreen(dest);
        // Remettre une entrée propre dans l'historique navigateur
        window.history.pushState({lrb: true, idx: 0}, "");
    }

    // Intercepter le bouton retour Android / navigateur
    useEffect(function() {
        // Entrée initiale dans l'historique navigateur
        window.history.pushState({lrb: true, idx: 0}, "");

        function handlePopState(e) {
            if(historyStack.current.length > 0) {
                var prev = historyStack.current.pop();
                setScreen(prev.screen);
                setData(prev.data);
                // Repousser une entrée pour pouvoir encore reculer
                window.history.pushState({lrb: true, idx: historyStack.current.length}, "");
            } else {
                setScreen("home");
                setData(null);
                window.history.pushState({lrb: true, idx: 0}, "");
            }
        }

        window.addEventListener("popstate", handlePopState);
        return function() { window.removeEventListener("popstate", handlePopState); };
    }, []);
    
    // Toast confirmation connexion automatique
    useEffect(function() {
        var savedCode = localStorage.getItem("lrb_remembered_code");
        if(savedCode && user) {
            showToast("👋 Connecté en tant que " + user.name, "success");
        }
    }, []); // Une seule fois au montage

    var GlobalHeader = h("div", null,
        offline ? h("div", {className:"offline-bar"}, "📵 MODE HORS-LIGNE — données en cache") : null,
        h("div", {className:"app-header-global"},
            h("img", {src:LRB_LOGO, className:"app-header-global-logo"}),
            h("div", {className:"app-header-global-title"},
                h("h1", null, "LES RENOVATEURS BRETONS"),
                h("p", null, "STOCK")
            ),
            user ? h("button", {
                style:{background:"none", border:"none", cursor:"pointer", fontSize:11, color:"rgba(255,255,255,0.6)", fontWeight:700, textAlign:"right", lineHeight:1.3, padding:0},
                onClick:function(){
                    localStorage.removeItem("lrb_remembered_code");
                    setUser(null);
                    setScreen("home");
                    historyStack.current = [];
                    window.history.pushState({lrb:true, idx:0}, "");
                }
            },
                h("div", null, user.name.split(" ")[0]),
                h("div", {style:{fontSize:9, opacity:0.7}}, "Changer ↩")
            ) : null
        )
    );
    
    if(!splashDone) {
        return h(SplashScreen, {onDone: function(){ setSplashDone(true); }});
    }

    if(!user) {
        return h("div", {className:"app"}, GlobalHeader, h(LoginScreen, {onLogin: function(u){setUser(u);}}));
    }
    
    var noNav = screen === "photo" || screen === "produit" || screen === "corpsdetat" || screen === "produits_list" || screen === "tutos" || screen === "users" || screen === "stats" || screen === "inventaire" || screen === "export" || screen === "bon_sortie" || screen === "chantiers" || screen === "fiches_chantiers" || screen === "import_csv";
    var currentScreen;
    
    switch(screen) {
        case "home":
            currentScreen = h(HomeScreen, {user:user, nav:nav, produits:produits});
            break;
        case "alertes":
            currentScreen = h(AlertesScreen, {produits:produits, nav:nav, user:user});
            break;
        case "stats":
            currentScreen = h(StatsScreen, {produits:produits, onBack:goBack});
            break;
        case "inventaire":
            currentScreen = h(InventaireScreen, {produits:produits, onBack:goBack, onRefresh:loadData, user:user});
            break;
        case "export":
            currentScreen = h(ExportScreen, {produits:produits, onBack:goBack});
            break;
        case "bon_sortie":
            currentScreen = h(BonSortieScreen, {produits:produits, onBack:goBack, onRefresh:loadData, user:user});
            break;
        case "chantiers":
            currentScreen = h(ChantiersScreen, {onBack:goBack});
            break;
        case "fiches_chantiers":
            currentScreen = h(FichesChantiersScreen, {onBack:goBack});
            break;
        case "import_csv":
            currentScreen = h(ImportCSVScreen, {onBack:goBack, onRefresh:loadData});
            break;
        case "corpsdetat":
            currentScreen = h(CorpsDetatScreen, {categorie:data.categorie, onBack:goBack, nav:nav, produits:produits});
            break;
        case "produits_list":
            currentScreen = h(ProduitsListScreen, {produits:produits, ce:data.ce, onBack:goBack, nav:nav});
            break;
        case "produit":
            currentScreen = h(ProduitDetail, {produit:data, onBack:goBack, onRefresh:loadData, isAdmin:user.role==="admin", user:user});
            break;
        case "photo":
            currentScreen = h(PhotoScreen, {user:user, onBack:goBack, onRefresh:loadData});
            break;
        case "achat":
            currentScreen = h(AchatScreen, {user:user, onBack:goBack, onRefresh:loadData, produits:produits});
            break;
        case "besoin":
            currentScreen = h(BesoinScreen, {user:user, onBack:goBack});
            break;
        case "tutos":
            currentScreen = h(TutoScreen, {onBack:goBack});
            break;
        case "users":
            currentScreen = h(UsersScreen, {onBack:goBack, user:user});
            break;
        case "profil":
            currentScreen = h(ProfilScreen, {user:user, onBack:goBack, onTutos:function(){nav("tutos", null);}, onStats:function(){nav("stats", null);}, onInventaire:function(){nav("inventaire", null);}, onBonSortie:function(){nav("bon_sortie", null);}, onChantiers:function(){nav("chantiers", null);}, onExport:function(){nav("export", null);}, onImport:function(){nav("import_csv", null);}, onFicheChantier:function(){nav("fiches_chantiers", null);}, onUsers:function(){nav("users", null);}, onLogout:function(){setUser(null); setScreen("home"); historyStack.current = []; localStorage.removeItem("lrb_remembered_code");}});
            break;
        default:
            currentScreen = h(HomeScreen, {user:user, nav:nav, produits:produits});
    }
    
    return h("div", {className:"app"},
        offline ? h("div", {className:"offline-banner"}, "📶 Mode hors-ligne — données en cache") : null,
        GlobalHeader, currentScreen,
        !noNav ? h(NavBar, {screen:screen, onNav:onNav, produits:produits}) : null
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
