<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LRB Stock - Gestion</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-primary { background-color: #d4a017; color: white; transition: all 0.3s; }
        .btn-primary:active { transform: scale(0.95); background-color: #b88a14; }
        .input-field { border: 2px solid #e2e8f0; border-radius: 1rem; padding: 0.75rem; width: 100%; transition: border-color 0.3s; }
        .input-field:focus { border-color: #d4a017; outline: none; }
    </style>
</head>
<body class="p-4 pb-20">

    <div class="flex items-center mb-6">
        <button onclick="window.location.reload()" class="p-3 bg-white rounded-full shadow-md mr-4 text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </button>
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Ajouter au stock</h1>
    </div>

    <div class="card p-6 mb-6">
        <div class="mb-4">
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Nom du produit *</label>
            <input type="text" id="p_nom" class="input-field text-lg font-medium" placeholder="Ex: Ciseau à bois MOB">
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Famille</label>
                <select id="p_famille" class="input-field bg-white">
                    <option value="OUTILLAGE">OUTILLAGE</option>
                    <option value="ELECTROPORTATIF">ELECTROPORTATIF</option>
                    <option value="CONSOMMABLES">CONSOMMABLES</option>
                    <option value="EPI / PROTECTION">EPI / PROTECTION</option>
                    <option value="QUINCAILLERIE">QUINCAILLERIE</option>
                    <option value="PLOMBERIE">PLOMBERIE</option>
                    <option value="ELECTRICITE">ELECTRICITE</option>
                    <option value="MENUISERIE">MENUISERIE</option>
                    <option value="PEINTURE">PEINTURE</option>
                    <option value="AUTRE">AUTRE</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Unité</label>
                <select id="p_unite" class="input-field bg-white">
                    <option value="pièce">pièce</option>
                    <option value="mètre">mètre</option>
                    <option value="m²">m²</option>
                    <option value="boite">boite</option>
                    <option value="sac">sac</option>
                    <option value="litre">litre</option>
                </select>
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-xs font-bold text-slate-500 uppercase mb-2 ml-1">Quantité *</label>
            <input type="number" id="p_quantite" class="input-field text-xl font-bold text-center" value="1">
        </div>

        <button onclick="validerStock()" id="btn_valider" class="w-full btn-primary py-4 rounded-2xl font-bold text-lg shadow-lg flex items-center justify-center">
            <span id="label_valider">✅ Valider le stock</span>
        </button>
    </div>

    <script>
        // Remplace par tes vraies infos si besoin, mais garde tes clés actuelles !
        const supabaseUrl = 'https://les-renovateurs-bretons.supabase.co'; // Ton URL
        const supabaseKey = 'TON_ANON_KEY_ICI'; // Ta clé Anon
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function validerStock() {
            const btn = document.getElementById('btn_valider');
            const label = document.getElementById('label_valider');
            
            const p_nom = document.getElementById('p_nom').value;
            const p_famille = document.getElementById('p_famille').value;
            const p_unite = document.getElementById('p_unite').value;
            const p_quantite = parseInt(document.getElementById('p_quantite').value);

            if(!p_nom) { alert("Donne un nom au produit !"); return; }

            btn.disabled = true;
            label.innerText = "Enregistrement...";

            try {
                const { error } = await supabase
                    .from('produits')
                    .insert([{ 
                        nom: p_nom, 
                        famille: p_famille, 
                        unite: p_unite, 
                        quantite: p_quantite,
                        date_ajout: new Date()
                    }]);

                if (error) throw error;

                alert("✅ Produit enregistré avec succès !");
                window.location.reload();

            } catch (err) {
                alert("Erreur : " + err.message);
                btn.disabled = false;
                label.innerText = "✅ Valider le stock";
            }
        }
    </script>
</body>
</html>
