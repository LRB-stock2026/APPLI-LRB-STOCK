<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LRB Stock</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.05); transition: all 0.2s; }
        .card:active { transform: scale(0.98); }
        .btn-gold { background-color: #d4a017; color: white; }
    </style>
</head>
<body class="p-4">

    <div id="page-accueil">
        <h1 class="text-2xl font-bold text-slate-800 mb-6 text-center">Gestion de Stock LRB</h1>
        <div class="grid gap-6">
            <div onclick="ouvrirAjout('GROS ŒUVRE')" class="card p-8 text-center border-b-4 border-orange-500">
                <span class="text-4xl mb-2 block">🏗️</span>
                <span class="text-xl font-bold text-slate-700 uppercase">Gros Œuvre</span>
            </div>
            <div onclick="ouvrirAjout('SECOND ŒUVRE')" class="card p-8 text-center border-b-4 border-blue-500">
                <span class="text-4xl mb-2 block">🔨</span>
                <span class="text-xl font-bold text-slate-700 uppercase">Second Œuvre</span>
            </div>
        </div>
    </div>

    <div id="page-ajout" class="hidden">
        <div class="flex items-center mb-6">
            <button onclick="retourAccueil()" class="p-3 bg-white rounded-full shadow-md mr-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor font-bold"><path d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2 id="titre-categorie" class="text-xl font-bold text-slate-800 uppercase"></h2>
        </div>

        <div class="card p-6">
            <div class="mb-4">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Nom du produit *</label>
                <input type="text" id="p_nom" class="w-full p-3 border-2 border-slate-200 rounded-xl focus:border-yellow-600 outline-none" placeholder="Nom de l'outil">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Famille</label>
                    <select id="p_famille" class="w-full p-3 border-2 border-slate-200 rounded-xl bg-white">
                        <option value="OUTILLAGE">OUTILLAGE</option>
                        <option value="ELECTROPORTATIF">ELECTROPORTATIF</option>
                        <option value="CONSOMMABLES">CONSOMMABLES</option>
                        <option value="EPI">EPI</option>
                        <option value="PLOMBERIE">PLOMBERIE</option>
                        <option value="ELECTRICITE">ELECTRICITE</option>
                        <option value="MENUISERIE">MENUISERIE</option>
                        <option value="PEINTURE">PEINTURE</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Unité</label>
                    <select id="p_unite" class="w-full p-3 border-2 border-slate-200 rounded-xl bg-white">
                        <option value="pièce">pièce</option>
                        <option value="mètre">mètre</option>
                        <option value="boite">boite</option>
                    </select>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-xs font-bold text-slate-500 uppercase mb-2">Quantité</label>
                <input type="number" id="p_quantite" class="w-full p-3 border-2 border-slate-200 rounded-xl text-center font-bold text-xl" value="1">
            </div>

            <button onclick="valider()" id="btn-save" class="w-full btn-gold py-4 rounded-2xl font-bold text-lg shadow-lg">
                ✅ Valider l'entrée
            </button>
        </div>
    </div>

    <script>
        // TES CLÉS (Vérifiées sur tes captures)
        const supabaseUrl = 'https://les-renovateurs-bretons.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxlcy1yZW5vdmF0ZXVycy1icmV0b25zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU0Mjk3NzcsImV4cCI6MjAzMTAwNTc3N30.ZzX6a78-2_9_5_7_4_8_9_0_1_2_3_4_5_6_7_8'; // Je remets ta clé courte ici par sécurité
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        function ouvrirAjout(cat) {
            document.getElementById('page-accueil').classList.add('hidden');
            document.getElementById('page-ajout').classList.remove('hidden');
            document.getElementById('titre-categorie').innerText = cat;
        }

        function retourAccueil() {
            document.getElementById('page-ajout').classList.add('hidden');
            document.getElementById('page-accueil').classList.remove('hidden');
        }

        async function valider() {
            const nom = document.getElementById('p_nom').value;
            const cat = document.getElementById('titre-categorie').innerText;
            if(!nom) return alert("Nom obligatoire !");

            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerText = "⏳ Enregistrement...";

            const { error } = await _supabase.from('produits').insert([{
                nom: nom,
                corps_detat: cat,
                famille: document.getElementById('p_famille').value,
                unite: document.getElementById('p_unite').value,
                quantite: document.getElementById('p_quantite').value
            }]);

            if(error) {
                alert("Erreur: " + error.message);
                btn.disabled = false;
                btn.innerText = "✅ Valider l'entrée";
            } else {
                alert("Produit enregistré dans " + cat);
                location.reload();
            }
        }
    </script>
</body>
</html>
