<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3D5470">
<title>LRB Stock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#3D5470;--navy-dark:#2d3f55;--gold:#C9973A;--gold-dim:#b8862e;--bg:#EDF0F4;--surface:#fff;--surface2:#E4E8EF;--border:#C8D0DC;--text:#1C2B3A;--text2:#3D5470;--text3:#7A90A8;--green:#2A7A38;--green-bg:#E6F4E8;--red:#C0392B;--red-bg:#FDEDEC;--orange:#C97320;--orange-bg:#FEF3E6;--shadow:0 3px 12px rgba(61,84,112,0.15);--navy-glow:0 6px 24px rgba(61,84,112,0.35);--gold-glow:0 6px 24px rgba(201,151,58,0.40)}
html,body{height:100%;font-family:"League Spartan",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100dvh;background:var(--bg)}
.app-header-global{position:sticky;top:0;z-index:45;background:rgba(237,240,244,0.97);border-bottom:1.5px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px}
.app-header-global-logo{width:42px;height:42px;border-radius:10px;object-fit:contain;background:#fff;padding:4px}
.app-header-global-title{flex:1}
.app-header-global-title h1{font-size:14px;font-weight:800;color:var(--navy);margin:0}
.app-header-global-title p{font-size:9px;color:var(--text3);margin:0}
.screen{padding:0 16px 90px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.login-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:24px}
.login-card{background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:340px;box-shadow:0 12px 40px rgba(0,0,0,0.25)}
.login-logo{display:block;width:130px;margin:0 auto 12px;border-radius:12px}
.login-title{text-align:center;font-size:26px;font-weight:900;color:var(--gold);margin-bottom:20px}
.header{position:sticky;top:0;z-index:30;background:rgba(237,240,244,0.95);padding:12px 0 8px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.header-back{width:38px;height:38px;background:var(--navy);border:none;border-radius:12px;color:#fff;font-size:18px;cursor:pointer}
.header-title{font-size:22px;font-weight:900;color:var(--navy)}
.header-sub{font-size:11px;color:var(--text3)}
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--navy);display:grid;grid-template-columns:repeat(5,1fr);z-index:50;padding:6px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;background:transparent;border:none;cursor:pointer}
.nav-emoji{font-size:20px;opacity:0.5}
.nav-item.active .nav-emoji{opacity:1}
.nav-label{font-size:8px;font-weight:700;color:rgba(255,255,255,0.45)}
.nav-item.active .nav-label{color:#fff}
.input,.select{width:100%;background:#fff;border:2px solid var(--border);border-radius:14px;padding:12px 14px;font-family:inherit;font-size:15px}
.input:focus,.select:focus{border-color:var(--navy)}
.input-code{text-align:center;font-size:30px;letter-spacing:0.4em;font-weight:900;padding:18px}
.input-label{font-size:10px;font-weight:800;color:var(--navy);display:block;margin-bottom:4px}
.checkbox-group{display:flex;align-items:center;gap:12px;margin:12px 0}
.checkbox-group input{width:20px;height:20px;cursor:pointer}
.checkbox-group label{font-size:14px;font-weight:600;color:var(--navy);cursor:pointer}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;border:none;font-weight:700;cursor:pointer;border-radius:14px;font-size:15px;padding:12px 20px}
.btn:active{transform:scale(0.96)}
.btn-navy{background:var(--navy);color:#fff}
.btn-gold{background:var(--gold);color:#fff}
.btn-outline{background:#fff;color:var(--navy);border:2px solid var(--border)}
.btn-full{width:100%}
.card{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:14px}
.home-buttons{display:flex;flex-direction:column;gap:16px;margin-top:16px}
.home-btn{padding:48px 24px;border-radius:28px;border:none;display:flex;align-items:center;justify-content:center;gap:20px;cursor:pointer}
.home-btn-icon{font-size:64px}
.home-btn-label{font-size:32px;font-weight:900;color:#fff}
.btn-gros{background:linear-gradient(135deg,#2d3f55,#1a2a3a)}
.btn-second{background:linear-gradient(135deg,#C9973A,#a67c2a)}
.ce-btn{width:100%;background:#fff;border:2px solid var(--border);border-radius:20px;padding:20px 18px;display:flex;align-items:center;gap:16px;cursor:pointer;margin-bottom:12px}
.ce-icon{font-size:32px}
.ce-label{font-size:18px;font-weight:800;color:var(--navy)}
.product-card{display:flex;gap:12px;padding:13px 14px;background:#fff;border-radius:16px;border:1.5px solid var(--border);margin-bottom:8px;cursor:pointer}
.product-thumb{width:50px;height:50px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px}
.product-name{font-size:15px;font-weight:700;color:var(--navy)}
.product-meta{font-size:12px;color:var(--text3)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;margin-top:4px}
.badge-ok{background:var(--green-bg);color:var(--green)}
.badge-low{background:var(--orange-bg);color:var(--orange)}
.badge-out{background:var(--red-bg);color:var(--red)}
.search-box{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--border);border-radius:14px;padding:11px 14px;margin-bottom:14px}
.search-box input{flex:1;border:none;background:transparent;font-size:15px;outline:none}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:100px;font-size:13px;font-weight:700;z-index:999}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.text-center{text-align:center}
.text-muted{color:var(--text3);font-size:13px}
.stock-counter{margin-top:8px;text-align:center;font-size:14px;font-weight:700;color:var(--navy);background:rgba(61,84,112,0.1);padding:8px;border-radius:24px;width:fit-content;margin:8px auto 0 auto}
.btn-edit{background:var(--gold-dim);border:none;border-radius:12px;padding:6px 12px;color:#fff;font-weight:bold;cursor:pointer;font-size:14px;margin-left:auto}
</style>
</head>
<body>
<div id="root"></div>

<script>

var LRB_LOGO = "https://kiomcpwjveppgragajyv.supabase.co/storage/v1/object/public/product-photos/LRB_Logo_300dpi.png";
var SUPABASE_URL = "https://kiomcpwjveppgragajyv.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtpb21jcHdqdmVwcGdyYWdhanl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwNzYyMDksImV4cCI6MjA5MzY1MjIwOX0.RHBrIC7Hz_5U91R6ZZTpoq8q925gcvN5d3UL5I8QAGU";
var USERS_LOCAL = {284916:{name:"David",role:"chantier"},651973:{name:"Jacques",role:"chantier"},908257:{name:"Mathys",role:"chantier"},739482:{name:"Administration",role:"admin"}};
var CORPS_ETAT_GROS = [{id:"maconnerie",label:"Maconnerie",icon:"🧱"},{id:"demolition",label:"Demolition",icon:"⛏️"},{id:"terrassement",label:"Terrassement",icon:"🚜"},{id:"beton",label:"Beton",icon:"🏗️"},{id:"charpente",label:"Charpente",icon:"🪵"},{id:"couverture",label:"Couverture",icon:"🏠"}];
var CORPS_ETAT_SECOND = [{id:"platrerie",label:"Platrerie",icon:"🪣"},{id:"peinture",label:"Peinture",icon:"🎨"},{id:"menuiserie",label:"Menuiserie",icon:"🪚"},{id:"carrelage",label:"Carrelage",icon:"🟦"},{id:"electricite",label:"Electricite",icon:"⚡"},{id:"plomberie",label:"Plomberie",icon:"🚿"},{id:"isolation",label:"Isolation",icon:"🌡️"},{id:"sols",label:"Sols",icon:"🦶"},{id:"quincaillerie",label:"Quincaillerie",icon:"🔩"},{id:"consommables",label:"Consommables",icon:"📦"},{id:"finitions",label:"Finitions",icon:"✨"},{id:"securite",label:"Securite",icon:"🦺"},{id:"nettoyage",label:"Nettoyage",icon:"🧹"},{id:"divers",label:"Divers",icon:"📦"}];

var ReactDOM = window.ReactDOM;

var useRef = React.useRef;

function showToast(msg, type) {
    var old = document.querySelectorAll(".toast");
    for(var i=0; i<old.length; i++) old[i].remove();
    var el = document.createElement("div");
    el.className = "toast" + (type === "success" ? " toast-success" : (type === "error" ? " toast-error" : ""));
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { if(el) el.remove(); }, 3000);
}

async function supaGet(table, query) {
    var url = SUPABASE_URL + "/rest/v1/" + table + (query ? "?" + query : "");
    var res = await fetch(url, {
        headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Accept": "application/json"
        }
    });
    var text = await res.text();
    if(!res.ok) throw new Error(text);
    return JSON.parse(text);
}

async function supaPost(table, data) {
    var res = await fetch(SUPABASE_URL + "/rest/v1/" + table, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Prefer": "return=minimal"
        },
        body: JSON.stringify(data)
    });
    var text = await res.text();
    if(!res.ok) throw new Error(text);
    return text ? JSON.parse(text) : {};
}

async function supaPatch(table, id, data) {
    var res = await fetch(SUPABASE_URL + "/rest/v1/" + table + "?id=eq." + id, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Prefer": "return=minimal"
        },
        body: JSON.stringify(data)
    });
    var text = await res.text();
    if(!res.ok) throw new Error(text);
    return {};
}

async function uploadPhoto(file, name) {
    var ext = file.name ? file.name.split(".").pop() : "jpg";
    var path = name.replace(/[^a-z0-9]/gi, "_").slice(0,20) + "-" + Date.now() + "." + ext;
    var res = await fetch(SUPABASE_URL + "/storage/v1/object/product-photos/" + path, {
        method: "POST",
        headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Content-Type": file.type || "image/jpeg"
        },
        body: file
    });
    if(!res.ok) throw new Error("Upload failed");
    return SUPABASE_URL + "/storage/v1/object/public/product-photos/" + path;
}

// LoginScreen
function LoginScreen(props) {
    var codeState = useState("");
    var code = codeState[0];
    var setCode = codeState[1];
    var errState = useState("");
    var err = errState[0];
    var setErr = errState[1];
    var loadingState = useState(false);
    var loading = loadingState[0];
    var setLoading = loadingState[1];
    var rememberState = useState(false);
    var rememberMe = rememberState[0];
    var setRememberMe = rememberState[1];

    useEffect(function() {
        var saved = localStorage.getItem("lrb_remembered_code");
        if(saved) {
            setCode(saved);
            setRememberMe(true);
        }
    }, []);

    async function doLogin() {
        if(code.length < 4) return;
        setLoading(true);
        setErr("");
        try {
            var rows = await supaGet("utilisateurs", "code=eq." + code + "&limit=1");
            if(rows && rows.length > 0) {
                if(rememberMe) localStorage.setItem("lrb_remembered_code", code);
                else localStorage.removeItem("lrb_remembered_code");
                props.onLogin({code: code, name: rows[0].nom, role: rows[0].role || "chantier"});
                setLoading(false);
                return;
            }
        } catch(e) {}
        if(USERS_LOCAL[code]) {
            if(rememberMe) localStorage.setItem("lrb_remembered_code", code);
            else localStorage.removeItem("lrb_remembered_code");
            props.onLogin(Object.assign({code: code}, USERS_LOCAL[code]));
        } else {
            setErr("Code incorrect");
        }
        setLoading(false);
    }

    return h("div", {className:"login-wrap"},
        h("div", {className:"login-card"},
            h("img", {src:LRB_LOGO, className:"login-logo"}),
            h("div", {className:"login-title"}, "STOCK"),
            h("label", {className:"input-label"}, "Code utilisateur"),
            h("input", {
                className:"input input-code",
                type:"tel",
                maxLength:6,
                placeholder:"xxxxxx",
                value:code,
                onChange:function(e){setCode(e.target.value); setErr("");},
                onKeyDown:function(e){if(e.key==="Enter") doLogin();}
            }),
            err ? h("div", {style:{color:"var(--red)", fontSize:12, marginBottom:12}}, err) : null,
            h("div", {className:"checkbox-group"},
                h("input", {type:"checkbox", id:"rememberMe", checked:rememberMe, onChange:function(e){setRememberMe(e.target.checked);}}),
                h("label", {htmlFor:"rememberMe"}, "Se souvenir de moi")
            ),
            h("button", {className:"btn btn-navy btn-full", onClick:doLogin, disabled:loading || code.length<4}, loading ? "..." : "Connexion")
        )
    );
}

// ProduitsListScreen
function ProduitsListScreen(props) {
    var searchState = useState("");
    var search = searchState[0];
    var setSearch = searchState[1];
    var ce = props.ce;
    var list = props.produits.filter(function(p) {
        return (p.corps_etat || "").toLowerCase().includes(ce.label.toLowerCase());
    });
    if(search) {
        list = list.filter(function(p) {
            return (p.nom || "").toLowerCase().includes(search.toLowerCase());
        });
    }
    return h("div", {className:"screen"},
        h("div", {className:"header"},
            h("button", {className:"header-back", onClick:props.onBack}, "←"),
            h("div", null, h("div", {className:"header-title"}, ce.label), h("div", {className:"header-sub"}, list.length + " produit(s)")),
            h("button", {style:{marginLeft:"auto", background:"transparent", border:"none", fontSize:22, cursor:"pointer"}, onClick:function(){props.nav("photo", null);}}, "➕")
        ),
        h("div", {className:"search-box"},
            h("span", {style:{color:"var(--text3)"}}, "🔍"),
            h("input", {placeholder:"Rechercher un produit...", value:search, onChange:function(e){setSearch(e.target.value);}})
        ),
        list.length === 0 ? h("div", {className:"text-center text-muted", style:{marginTop:24}}, "Aucun produit") : null,
        list.map(function(p) {
            var statut = (p.quantite||0) <= 0 ? "out" : ((p.quantite||0) <= (p.quantite_min||1) ? "low" : "ok");
            return h("div", {key:p.id, className:"product-card product-" + statut, onClick:function(){props.nav("produit", p);}},
                h("div", {className:"product-thumb"}, p.photo_url ? h("img", {src:p.photo_url}) : "📦"),
                h("div", {style:{flex:1}},
                    h("div", {className:"product-name"}, p.nom),
                    h("div", {className:"product-meta"}, (p.corps_etat || p.famille || "") + (p.emplacement ? " · " + p.emplacement : "")),
                    h("span", {className:"badge badge-" + statut}, (statut==="ok"?"✅":statut==="low"?"⚠️":"❌") + " " + (p.quantite||0) + " " + (p.unite||"piece"))
                )
            );
        })
    );
}

// ProduitDetail (avec bouton Modifier)
function ProduitDetail(props) {
    var p = props.produit;
    var qtyState = useState("");
    var qty = qtyState[0];
    var setQty = qtyState[1];
    var addState = useState("");
    var add = addState[0];
    var setAdd = addState[1];
    var statut = (p.quantite||0) <= 0 ? "out" : ((p.quantite||0) <= (p.quantite_min||1) ? "low" : "ok");
    
    async function sortir() {
        var q = parseFloat(qty);
        if(!q || q<=0) return;
        try {
            await supaPatch("produits", p.id, {quantite: Math.max(0, (p.quantite||0) - q)});
            showToast(q + " sorti(s)", "success");
            setQty("");
            props.onRefresh();
            props.onBack();
        } catch(e) { showToast("Erreur: " + e.message, "error"); }
    }
    
    async function ajouter() {
        var q = parseFloat(add);
        if(!q || q<=0) return;
        try {
            await supaPatch("produits", p.id, {quantite: (p.quantite||0) + q});
            showToast(q + " ajoute(s)", "success");
            setAdd("");
            props.onRefresh();
            props.onBack();
        } catch(e) { showToast("Erreur: " + e.message, "error"); }
    }
    
    return h("div", {className:"screen"},
        h("div", {className:"header"},
            h("button", {className:"header-back", onClick:props.onBack}, "←"),
            h("div", {style:{flex:1}}, h("div", {className:"header-title", style:{fontSize:18}}, p.nom), h("div", {className:"header-sub"}, p.corps_etat || p.famille || "")),
            h("button", {className:"btn-edit", onClick:function(){ if(props.nav) props.nav("edit_produit", p); }}, "✏️ Modifier")
        ),
        h("div", {className:"product-hero"}, p.photo_url ? h("img", {src:p.photo_url}) : "📦"),
        h("span", {className:"badge badge-" + statut, style:{marginBottom:14}}, (statut==="ok"?"✅ En stock":statut==="low"?"⚠️ Stock bas":"❌ Rupture") + " — " + (p.quantite||0) + " " + (p.unite||"piece")),
        h("div", {className:"grid-2"},
            h("div", {className:"card"},
                h("div", {className:"section-title"}, "➕ AJOUTER"),
                h("input", {className:"input", type:"number", placeholder:"Quantite", value:add, onChange:function(e){setAdd(e.target.value);}}),
                h("button", {className:"btn btn-navy btn-full", style:{marginTop:8}, onClick:ajouter, disabled:!add}, "Ajouter")
            ),
            h("div", {className:"card"},
                h("div", {className:"section-title"}, "➖ SORTIR"),
                h("input", {className:"input", type:"number", placeholder:"Quantite", value:qty, onChange:function(e){setQty(e.target.value);}}),
                h("button", {className:"btn btn-gold btn-full", style:{marginTop:8}, onClick:sortir, disabled:!qty}, "Sortir")
            )
        )
    );
}

// PhotoScreen (avec correction du bug d'enregistrement sans photo)
function PhotoScreen(props) {
    var stepState = useState("capture");
    var step = stepState[0];
    var setStep = stepState[1];
    var previewState = useState(null);
    var preview = previewState[0];
    var setPreview = previewState[1];
    var imgFileState = useState(null);
    var imgFile = imgFileState[0];
    var setImgFile = imgFileState[1];
    var resultState = useState(null);
    var result = resultState[0];
    var setResult = resultState[1];
    var qtyState = useState("");
    var qty = qtyState[0];
    var setQty = qtyState[1];
    var savingState = useState(false);
    var saving = savingState[0];
    var setSaving = savingState[1];
    var fileRef = useRef(null);
    
    function handleFile(e) {
        var file = e.target.files[0];
        if(!file) return;
        setImgFile(file);
        var reader = new FileReader();
        reader.onload = function(ev) { setPreview(ev.target.result); };
        reader.readAsDataURL(file);
        setStep("analyzing");
        setTimeout(function() {
            setResult({nom:"Produit reconnu", famille:"MATERIAUX", corps_etat:"Divers", unite:"piece"});
            setQty("1");
            setStep("result");
        }, 1500);
    }
    
    function handleManualEntry() {
        setStep("result");
        setResult({nom:"", famille:"MATERIAUX", corps_etat:"", unite:"piece"});
        setQty("1");
        setImgFile(null);
        setPreview(null);
    }
    
    function handleSave() {
        if(!result.nom) { showToast("Nom obligatoire", "error"); return; }
        setSaving(true);
        var savePromise;
        if(imgFile) {
            savePromise = uploadPhoto(imgFile, (result.nom || "produit").replace(/[^a-z0-9]/gi, "_").slice(0,15))
                .then(function(pu) {
                    return supaPost("produits", {
                        nom: result.nom,
                        famille: result.famille,
                        corps_etat: result.corps_etat,
                        unite: result.unite || "piece",
                        quantite: parseFloat(qty) || 1,
                        photo_url: pu,
                        user_id: props.user.code
                    });
                });
        } else {
            savePromise = supaPost("produits", {
                nom: result.nom,
                famille: result.famille,
                corps_etat: result.corps_etat,
                unite: result.unite || "piece",
                quantite: parseFloat(qty) || 1,
                user_id: props.user.code
            });
        }
        savePromise.then(function() {
            showToast("Produit enregistre !", "success");
            if(props.onRefresh) props.onRefresh();
            props.onBack();
        }).catch(function(err) {
            showToast("Erreur: " + err.message, "error");
            setSaving(false);
        });
    }
    
    function reset() {
        setStep("capture");
        setResult(null);
        setImgFile(null);
        setPreview(null);
    }
    
    if(step === "capture") {
        return h("div", {className:"screen"},
            h("div", {className:"header"},
                h("button", {className:"header-back", onClick:props.onBack}, "←"),
                h("div", null, h("div", {className:"header-title"}, "📷 Photo IA"), h("div", {className:"header-sub"}, "Identification automatique"))
            ),
            h("div", {style:{background:"var(--surface2)", border:"2px dashed var(--border)", borderRadius:20, padding:"36px 24px", textAlign:"center", marginTop:16}},
                h("div", {style:{fontSize:64, marginBottom:14}}, "📷"),
                h("div", {style:{fontSize:16, fontWeight:700, color:"var(--navy)", marginBottom:8}}, "Prenez une photo du produit"),
                h("div", {className:"text-muted", style:{marginBottom:24}}, "L'IA identifie le produit"),
                h("input", {ref:fileRef, type:"file", accept:"image/*", capture:"environment", style:{display:"none"}, onChange:handleFile}),
                h("button", {className:"btn btn-navy btn-full", style:{marginBottom:10}, onClick:function(){if(fileRef.current) fileRef.current.click();}}, "📷 Prendre une photo"),
                h("button", {className:"btn btn-outline btn-full", onClick:function(){if(fileRef.current){fileRef.current.removeAttribute("capture"); fileRef.current.click();}}}, "📁 Depuis la galerie"),
                h("button", {className:"btn btn-outline btn-full", style:{marginTop:10}, onClick:handleManualEntry}, "⌨️ Saisie Manuelle")
            )
        );
    }
    
    if(step === "analyzing") {
        return h("div", {className:"screen"},
            h("div", {className:"header"},
                h("button", {className:"header-back", onClick:props.onBack}, "←"),
                h("div", null, h("div", {className:"header-title"}, "Analyse en cours..."))
            ),
            preview ? h("img", {src:preview, style:{width:"100%", maxHeight:220, objectFit:"cover", borderRadius:16, marginTop:16}}) : null,
            h("div", {style:{textAlign:"center", marginTop:32}},
                h("div", {className:"spinner"}),
                h("div", {style:{fontWeight:700, color:"var(--navy)", fontSize:16, marginTop:16}}, "L'IA analyse le produit...")
            )
        );
    }
    
    if(step === "result" && result) {
        function upd(k) {
            return function(e) {
                var v = e.target.value;
                setResult(function(r) { var n = Object.assign({}, r); n[k] = v; return n; });
            };
        }
        return h("div", {className:"screen"},
            h("div", {className:"header"},
                h("button", {className:"header-back", onClick:reset}, "←"),
                h("div", null, h("div", {className:"header-title"}, "Produit identifie"), h("div", {className:"header-sub"}, "Verifiez avant de valider"))
            ),
            preview ? h("img", {src:preview, style:{width:"100%", height:180, objectFit:"cover", borderRadius:16, marginBottom:14}}) : null,
            h("div", {className:"space-y"},
                h("div", {className:"input-group"},
                    h("label", {className:"input-label"}, "Nom du produit *"),
                    h("input", {className:"input", value:result.nom || "", onChange:upd("nom")})
                ),
                h("div", {className:"grid-2"},
                    h("div", {className:"input-group"},
                        h("label", {className:"input-label"}, "Famille"),
                        h("select", {className:"select", value:result.famille || "MATERIAUX", onChange:upd("famille")},
                            h("option", null, "MATERIAUX"),
                            h("option", null, "OUTILLAGE")
                        )
                    ),
                    h("div", {className:"input-group"},
                        h("label", {className:"input-label"}, "Corps d'etat"),
                        h("input", {className:"input", value:result.corps_etat || "", onChange:upd("corps_etat")})
                    )
                ),
                h("div", {className:"grid-2"},
                    h("div", {className:"input-group"},
                        h("label", {className:"input-label"}, "Quantite *"),
                        h("input", {className:"input", type:"number", value:qty, onChange:function(e){setQty(e.target.value);}})
                    ),
                    h("div", {className:"input-group"},
                        h("label", {className:"input-label"}, "Unite"),
                        h("select", {className:"select", value:result.unite || "piece", onChange:upd("unite")},
                            UNITES.map(function(u){ return h("option", {key:u}, u); })
                        )
                    )
                )
            ),
            h("div", {className:"grid-2", style:{marginTop:14}},
                h("button", {className:"btn btn-outline", onClick:reset}, "Reprendre"),
                h("button", {className:"btn btn-gold", onClick:handleSave, disabled:saving || !result.nom || !qty}, saving ? "..." : "Valider")
            )
        );
    }
    return null;
}

// App
function App() {
    var userState = useState(null);
    var user = userState[0];
    var setUser = userState[1];
    var screenState = useState("home");
    var screen = screenState[0];
    var setScreen = screenState[1];
    var dataState = useState(null);
    var data = dataState[0];
    var setData = dataState[1];
    var produitsState = useState([]);
    var produits = produitsState[0];
    var setProduits = produitsState[1];
    var historyStack = useRef([]);
    
    var loadData = useCallback(async function() {
        try {
            var p = await supaGet("produits", "order=nom.asc");
            setProduits(Array.isArray(p) ? p : []);
        } catch(e) { setProduits([]); }
    }, []);
    
    useEffect(function() {
        if(user) loadData();
    }, [user, loadData]);
    
    useEffect(function() {
        var savedCode = localStorage.getItem("lrb_remembered_code");
        if(savedCode && !user) {
            if(USERS_LOCAL[savedCode]) {
                setUser(Object.assign({code: savedCode}, USERS_LOCAL[savedCode]));
            } else {
                supaGet("utilisateurs", "code=eq." + savedCode + "&limit=1").then(function(rows) {
                    if(rows && rows.length > 0) {
                        setUser({code: savedCode, name: rows[0].nom, role: rows[0].role || "chantier"});
                    }
                }).catch(function() {});
            }
        }
    }, [user]);
    
    function nav(dest, d) {
        historyStack.current.push({screen: screen, data: data});
        setScreen(dest);
        setData(d);
    }
    
    function goBack() {
        if(historyStack.current.length > 0) {
            var prev = historyStack.current.pop();
            setScreen(prev.screen);
            setData(prev.data);
        } else {
            setScreen("home");
            setData(null);
        }
    }
    
    function onNav(dest) {
        historyStack.current = [];
        setData(null);
        setScreen(dest);
    }
    
    var GlobalHeader = h("div", {className:"app-header-global"},
        h("img", {src:LRB_LOGO, className:"app-header-global-logo"}),
        h("div", {className:"app-header-global-title"},
            h("h1", null, "LES RENOVATEURS BRETONS"),
            h("p", null, "STOCK")
        ),
        user ? h("div", {style:{width:38}}) : null
    );
    
    if(!user) {
        return h("div", {className:"app"}, GlobalHeader, h(LoginScreen, {onLogin: function(u){setUser(u);}}));
    }
    
    var noNav = (screen === "photo" || screen === "produit" || screen === "edit_produit");
    var currentScreen;
    
    switch(screen) {
        case "home":
            currentScreen = h(HomeScreen, {nav:nav, produits:produits});
            break;
        case "corpsdetat":
            currentScreen = h(CorpsDetatScreen, {categorie:data.categorie, onBack:goBack, nav:nav});
            break;
        case "produits_list":
            currentScreen = h(ProduitsListScreen, {produits:produits, ce:data.ce, onBack:goBack, nav:nav});
            break;
        case "produit":
            currentScreen = h(ProduitDetail, {produit:data, onBack:goBack, onRefresh:loadData, nav:nav});
            break;
        case "edit_produit":
            currentScreen = h(EditProduitScreen, {produit:data, onBack:goBack, onRefresh:loadData});
            break;
        case "photo":
            currentScreen = h(PhotoScreen, {user:user, onBack:goBack, onRefresh:loadData});
            break;
        case "achat":
            currentScreen = h(AchatScreen, {user:user, onBack:goBack, onRefresh:loadData});
            break;
        case "besoin":
            currentScreen = h(BesoinScreen, {user:user, onBack:goBack});
            break;
        case "profil":
            currentScreen = h(ProfilScreen, {user:user, onBack:goBack, onLogout:function(){setUser(null); setScreen("home"); historyStack.current = []; localStorage.removeItem("lrb_remembered_code");}});
            break;
        default:
            currentScreen = h(HomeScreen, {nav:nav, produits:produits});
    }
    
    return h("div", {className:"app"}, GlobalHeader, currentScreen, !noNav ? h(NavBar, {screen:screen, onNav:onNav}) : null);
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
