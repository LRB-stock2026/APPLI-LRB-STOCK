<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3D5470">
<title>LRB Stock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#3D5470;--navy-dark:#2d3f55;--gold:#C9973A;--gold-dim:#b8862e;--bg:#EDF0F4;--surface:#fff;--surface2:#E4E8EF;--border:#C8D0DC;--text:#1C2B3A;--text2:#3D5470;--text3:#7A90A8;--green:#2A7A38;--green-bg:#E6F4E8;--red:#C0392B;--red-bg:#FDEDEC;--orange:#C97320;--orange-bg:#FEF3E6;--shadow:0 3px 12px rgba(61,84,112,0.15);--navy-glow:0 6px 24px rgba(61,84,112,0.35);--gold-glow:0 6px 24px rgba(201,151,58,0.40)}
html,body{height:100%;font-family:"League Spartan",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.app{max-width:430px;margin:0 auto;min-height:100dvh;background:var(--bg)}
.app-header-global{position:sticky;top:0;z-index:45;background:rgba(237,240,244,0.97);border-bottom:1.5px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px}
.app-header-global-logo{width:42px;height:42px;border-radius:10px;object-fit:contain;background:#fff;padding:4px}
.app-header-global-title{flex:1}
.app-header-global-title h1{font-size:14px;font-weight:800;color:var(--navy);margin:0}
.app-header-global-title p{font-size:9px;color:var(--text3);margin:0}
.screen{padding:0 16px 90px;animation:fadeUp .2s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.login-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:var(--navy);padding:24px}
.login-card{background:#fff;border-radius:24px;padding:32px 24px;width:100%;max-width:340px;box-shadow:0 12px 40px rgba(0,0,0,0.25)}
.login-logo{display:block;width:130px;margin:0 auto 12px;border-radius:12px}
.login-title{text-align:center;font-size:26px;font-weight:900;color:var(--gold);margin-bottom:20px}
.header{position:sticky;top:0;z-index:30;background:rgba(237,240,244,0.95);padding:12px 0 8px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.header-back{width:38px;height:38px;background:var(--navy);border:none;border-radius:12px;color:#fff;font-size:18px;cursor:pointer}
.header-title{font-size:22px;font-weight:900;color:var(--navy)}
.header-sub{font-size:11px;color:var(--text3)}
.navbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--navy);display:grid;grid-template-columns:repeat(5,1fr);z-index:50;padding:6px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px;background:transparent;border:none;cursor:pointer}
.nav-emoji{font-size:20px;opacity:0.5}
.nav-item.active .nav-emoji{opacity:1}
.nav-label{font-size:8px;font-weight:700;color:rgba(255,255,255,0.45)}
.nav-item.active .nav-label{color:#fff}
.input,.select{width:100%;background:#fff;border:2px solid var(--border);border-radius:14px;padding:12px 14px;font-family:inherit;font-size:15px}
.input:focus,.select:focus{border-color:var(--navy)}
.input-code{text-align:center;font-size:30px;letter-spacing:0.4em;font-weight:900;padding:18px}
.input-label{font-size:10px;font-weight:800;color:var(--navy);display:block;margin-bottom:4px}
.checkbox-group{display:flex;align-items:center;gap:12px;margin:12px 0}
.checkbox-group input{width:20px;height:20px;cursor:pointer}
.checkbox-group label{font-size:14px;font-weight:600;color:var(--navy);cursor:pointer}
.splash{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.6s ease, transform 0.6s ease}
.splash.hide{opacity:0;transform:scale(1.05);pointer-events:none}
.splash-logo{width:200px;border-radius:20px;animation:splashPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
.splash-sub{color:rgba(255,255,255,0.5);font-size:12px;font-weight:700;letter-spacing:0.15em;margin-top:16px;animation:fadeIn 0.8s 0.3s both}
.splash-bar{width:160px;height:3px;background:rgba(255,255,255,0.15);border-radius:4px;margin-top:40px;overflow:hidden;animation:fadeIn 0.5s 0.4s both}
.splash-progress{height:100%;background:var(--gold);border-radius:4px;animation:progress 1.8s 0.3s ease forwards}
@keyframes splashPop{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes progress{from{width:0%}to{width:100%}}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;border:none;font-weight:700;cursor:pointer;border-radius:14px;font-size:15px;padding:12px 20px}
.btn:active{transform:scale(0.96)}
.btn-navy{background:var(--navy);color:#fff}
.btn-gold{background:var(--gold);color:#fff}
.btn-outline{background:#fff;color:var(--navy);border:2px solid var(--border)}
.btn-full{width:100%}
.card{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:14px}
.home-buttons{display:flex;flex-direction:column;gap:16px;margin-top:16px}
.home-btn{padding:48px 24px;border-radius:28px;border:none;display:flex;align-items:center;justify-content:center;gap:20px;cursor:pointer}
.home-btn-icon{font-size:64px}
.home-btn-label{font-size:32px;font-weight:900;color:#fff}
.btn-gros{background:linear-gradient(135deg,#2d3f55,#1a2a3a)}
.btn-second{background:linear-gradient(135deg,#C9973A,#a67c2a)}
.ce-btn{width:100%;background:#fff;border:2px solid var(--border);border-radius:20px;padding:20px 18px;display:flex;align-items:center;gap:16px;cursor:pointer;margin-bottom:12px}
.ce-icon{font-size:32px}
.ce-label{font-size:18px;font-weight:800;color:var(--navy)}
.product-card{display:flex;gap:12px;padding:13px 14px;background:#fff;border-radius:16px;border:1.5px solid var(--border);margin-bottom:8px;cursor:pointer}
.product-thumb{width:50px;height:50px;min-width:50px;border-radius:12px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.product-name{font-size:15px;font-weight:700;color:var(--navy)}
.product-meta{font-size:12px;color:var(--text3)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;margin-top:4px}
.badge-ok{background:var(--green-bg);color:var(--green)}
.badge-low{background:var(--orange-bg);color:var(--orange)}
.badge-out{background:var(--red-bg);color:var(--red)}
.search-box{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid var(--border);border-radius:14px;padding:11px 14px;margin-bottom:14px}
.search-box input{flex:1;border:none;background:transparent;font-size:15px;outline:none}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:11px 20px;border-radius:100px;font-size:13px;font-weight:700;z-index:999}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin 0.6s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.text-center{text-align:center}
.text-muted{color:var(--text3);font-size:13px}
.stock-counter{margin-top:8px;text-align:center;font-size:14px;font-weight:700;color:var(--navy);background:rgba(61,84,112,0.1);padding:8px;border-radius:24px;width:fit-content;margin:8px auto 0 auto}

/* === CLASSES MANQUANTES === */
.space-y > * + *{margin-top:12px}
.input-group{display:flex;flex-direction:column;gap:4px}
.section-title{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.product-hero{width:100%;height:160px;max-height:40vw;background:var(--surface2);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:64px;margin-bottom:14px;overflow:hidden}
.product-hero img{width:100%;height:100%;object-fit:cover;border-radius:16px;display:block}
.product-thumb img{width:50px;height:50px;object-fit:cover;border-radius:12px;display:block}
.profil-avatar{font-size:56px;margin-bottom:8px}
.profil-name{font-size:22px;font-weight:900;color:var(--navy);margin-bottom:4px}
.profil-role{font-size:12px;color:var(--text3);margin-bottom:20px}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:10px}
.toast-success{background:var(--green) !important}
.toast-error{background:var(--red) !important}
.nav-dot{width:4px;height:4px;border-radius:50%;background:transparent;margin-top:1px}
.nav-item.active .nav-dot{background:var(--gold)}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid var(--border);background:#fff;color:var(--text2);cursor:pointer}
.chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip-gold.active{background:var(--gold);color:#fff;border-color:var(--gold)}
.chip-red.active{background:var(--red);color:#fff;border-color:var(--red)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-state-icon{font-size:48px;margin-bottom:12px}
.empty-state-text{font-size:14px;font-weight:600}
.lieu-chip{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;border:2px solid var(--border);background:#fff;color:var(--text2);cursor:pointer;white-space:nowrap}
.lieu-chip.selected{background:var(--navy);color:#fff;border-color:var(--navy)}
.lieu-chip.none{background:var(--surface2);color:var(--text3);border-color:var(--border)}
.search-global{position:relative;margin:0 0 12px 0}
.search-global input{width:100%;padding:13px 16px 13px 42px;border-radius:14px;border:2px solid var(--border);font-size:15px;font-family:inherit;background:#fff;box-sizing:border-box}
.search-global input:focus{border-color:var(--navy);outline:none}
.search-global .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none}
.search-results{background:#fff;border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin-bottom:12px}
.search-result-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.search-result-item:last-child{border-bottom:none}
.search-result-item:hover{background:var(--surface2)}
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:800;display:flex;flex-direction:column;justify-content:flex-end}
.edit-sheet{background:#fff;border-radius:24px 24px 0 0;padding:20px 16px 36px;max-height:85vh;overflow-y:auto}
.edit-sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.stat-card{background:#fff;border-radius:16px;padding:16px;border:1.5px solid var(--border);text-align:center}
.stat-value{font-size:32px;font-weight:900;color:var(--navy);line-height:1}
.stat-label{font-size:10px;font-weight:800;color:var(--text3);letter-spacing:0.07em;margin-top:4px;text-transform:uppercase}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.stat-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.chantier-fiche{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:16px;margin-bottom:10px}
.chantier-statut-encours{background:#D4EDDA;color:#155724;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px}
.chantier-statut-termine{background:#E2E3E5;color:#383d41;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px}
.chantier-statut-pause{background:#FFF3CD;color:#856404;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px}
.qr-modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:950;display:flex;align-items:center;justify-content:center;padding:20px}
.qr-box{background:#fff;border-radius:24px;padding:24px;text-align:center;width:280px}
.qr-img{width:200px;height:200px;border:1.5px solid var(--border);border-radius:12px;margin:12px auto}
.budget-bar-bg{background:var(--surface2);border-radius:6px;height:10px;overflow:hidden;margin:6px 0}
.budget-bar-fill{height:100%;border-radius:6px;transition:width 0.5s ease}
.import-zone{border:2px dashed var(--border);border-radius:16px;padding:32px;text-align:center;cursor:pointer;background:var(--surface2)}
.import-zone:hover{border-color:var(--navy);background:rgba(61,84,112,0.05)}
.import-col-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.import-col-row:last-child{border-bottom:none}
.chantier-fiche{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:16px;margin-bottom:10px}
.statut-encours{background:#D4EDDA;color:#155724;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px}
.statut-termine{background:#E2E3E5;color:#383d41;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px}
.statut-pause{background:#FFF3CD;color:#856404;font-size:10px;font-weight:800;padding:2px 8px;border-radius:8px}
.import-zone{border:2px dashed var(--border);border-radius:16px;padding:32px;text-align:center;cursor:pointer;background:var(--surface2)}
.chantier-card{background:#fff;border-radius:16px;border:1.5px solid var(--border);margin-bottom:10px;overflow:hidden}
.chantier-card-header{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}
.chantier-badge{background:var(--navy);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:10px}
.bon-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.bon-item:last-child{border-bottom:none}
.bon-qty{font-size:16px;font-weight:900;color:var(--navy);min-width:50px;text-align:right}
.bon-input{width:60px;padding:6px 8px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;font-weight:800;text-align:center;font-family:inherit}
.bon-input:focus{border-color:var(--navy);outline:none}
.top-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.top-item:last-child{border-bottom:none}
.top-rank{width:24px;height:24px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.invent-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.invent-row:last-child{border-bottom:none}
.invent-current{font-size:13px;font-weight:700;color:var(--text3);min-width:40px;text-align:right}
.invent-input{width:70px;padding:6px 10px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;font-weight:800;text-align:center;font-family:inherit}
.invent-input:focus{border-color:var(--navy);outline:none}
.invent-diff-pos{color:var(--green);font-size:11px;font-weight:800}
.invent-diff-neg{color:var(--red);font-size:11px;font-weight:800}
.confirm-modal{position:fixed;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:950;display:flex;align-items:flex-end;justify-content:center}
.confirm-sheet{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;animation:slideUp 0.25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.confirm-product-name{font-size:18px;font-weight:900;color:var(--navy);margin:10px 0 4px}
.confirm-warning{font-size:13px;color:var(--red);font-weight:600;background:#FFF0F0;padding:10px 14px;border-radius:10px;margin:12px 0}
.recu-modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:900;display:flex;align-items:center;justify-content:center;padding:20px}
.recu-modal-box{background:#fff;border-radius:20px;padding:22px;width:100%;max-width:380px}
.user-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.user-row:last-child{border-bottom:none}
.user-code{font-size:18px;font-weight:900;color:var(--navy);background:rgba(61,84,112,0.1);padding:6px 12px;border-radius:10px;font-family:monospace}
.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sort-bar select{flex:1;padding:7px 10px;border-radius:10px;border:1.5px solid var(--border);font-size:12px;font-family:inherit;background:#fff;color:var(--navy);font-weight:700}
.chantier-input{background:rgba(61,84,112,0.06);border:none;border-radius:10px;padding:8px 12px;font-size:13px;font-family:inherit;width:100%;box-sizing:border-box;color:var(--navy)}
.chantier-input:focus{outline:2px solid var(--navy)}
.sous-fam-tag{display:inline-block;background:rgba(201,151,58,0.13);color:var(--gold-dim);font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;margin-top:2px}
.lieu-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(61,84,112,0.10);color:var(--navy);font-size:12px;font-weight:800;padding:4px 10px;border-radius:10px;margin-bottom:10px}
.product-card-actions{display:flex;gap:8px;margin-top:10px}
.product-ok{border-left:3px solid var(--green)}
.product-low{border-left:3px solid var(--orange)}
.product-out{border-left:3px solid var(--red)}
.mvt-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.mvt-row:last-child{border-bottom:none}
.mvt-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.mvt-icon-entree{background:var(--green-bg)}
.mvt-icon-sortie{background:var(--orange-bg)}
.mvt-icon-creation{background:rgba(61,84,112,0.1)}
.mvt-nom{font-size:13px;font-weight:700;color:var(--navy)}
.mvt-meta{font-size:11px;color:var(--text3)}
.mvt-qty{font-size:13px;font-weight:900;margin-left:auto;white-space:nowrap}
.tuto-card{background:#fff;border-radius:20px;border:1.5px solid var(--border);margin-bottom:12px;overflow:hidden;cursor:pointer}
.tuto-card-header{display:flex;align-items:center;gap:14px;padding:16px}

.tuto-card-title{font-size:15px;font-weight:800;color:var(--navy)}
.tuto-card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.tuto-card-arrow{margin-left:auto;font-size:18px;color:var(--text3)}
.tuto-step{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.tuto-step:last-child{border-bottom:none}
.tuto-step-num{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tuto-step-title{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:3px}
.tuto-step-desc{font-size:12px;color:var(--text3);line-height:1.5}
.tuto-badge-done{background:var(--green-bg);color:var(--green);font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px}
.tab-bar{display:flex;background:var(--surface2);border-radius:14px;padding:3px;margin-bottom:14px;gap:3px}
.tab-btn{flex:1;padding:8px;border:none;border-radius:11px;font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;background:transparent;color:var(--text3)}
.tab-btn.active{background:#fff;color:var(--navy);box-shadow:0 2px 6px rgba(61,84,112,0.15)}
.ressource-card{background:#fff;border-radius:16px;border:1.5px solid var(--border);margin-bottom:10px;overflow:hidden}
.ressource-card-header{display:flex;align-items:center;gap:12px;padding:14px;cursor:pointer}
.ressource-card-type{font-size:9px;font-weight:800;letter-spacing:0.08em;padding:2px 7px;border-radius:6px;margin-bottom:4px;display:inline-block}
.ressource-type-dtu{background:#E8F0FE;color:#1a5cb5}
.ressource-type-regle{background:var(--green-bg);color:var(--green)}
.ressource-type-video{background:#FEE8E8;color:#c0392b}
.ressource-type-conseil{background:var(--orange-bg);color:var(--orange)}
.ressource-body{padding:0 14px 14px;border-top:1px solid var(--border)}
.ressource-body ul{margin:8px 0 0 16px}
.ressource-body li{font-size:12px;color:var(--text2);line-height:1.8}
.ressource-ref{font-size:11px;font-weight:700;color:var(--navy);background:rgba(61,84,112,0.08);padding:4px 10px;border-radius:8px;display:inline-block;margin-top:8px}
.prix-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(39,174,96,0.12);color:var(--green);font-size:13px;font-weight:800;padding:5px 12px;border-radius:10px}
.fournisseur-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(61,84,112,0.08);color:var(--navy);font-size:12px;font-weight:700;padding:4px 10px;border-radius:10px}
.statut-chip{padding:5px 12px;border-radius:16px;font-size:11px;font-weight:800;border:none;cursor:pointer}
.statut-pending{background:#FFF3CD;color:#856404}
.statut-ordered{background:#CCE5FF;color:#004085}
.statut-received{background:#D4EDDA;color:#155724}
.statut-cancelled{background:#F8D7DA;color:#721c24}
.scanner-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center}
.scanner-frame{width:260px;height:160px;border:3px solid var(--gold);border-radius:16px;position:relative;overflow:hidden}
.scanner-frame video{width:100%;height:100%;object-fit:cover}
.scanner-line{position:absolute;left:0;right:0;height:2px;background:var(--gold);animation:scanline 1.8s ease-in-out infinite}
@keyframes scanline{0%{top:10%}50%{top:85%}100%{top:10%}}
.offline-banner{background:var(--orange);color:#fff;text-align:center;font-size:12px;font-weight:700;padding:6px;position:fixed;top:0;left:0;right:0;z-index:500}
.statut-chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;border:2px solid transparent;cursor:pointer;white-space:nowrap}
.statut-attente{background:var(--orange-bg);color:var(--orange);border-color:var(--orange)}
.statut-commande{background:#E8F0FE;color:#1a5cb5;border-color:#1a5cb5}
.statut-recu{background:var(--green-bg);color:var(--green);border-color:var(--green)}
.statut-annule{background:var(--red-bg);color:var(--red);border-color:var(--red)}
.achat-row{background:#fff;border-radius:14px;border:1.5px solid var(--border);padding:12px 14px;margin-bottom:8px}
.offline-bar{background:var(--orange);color:#fff;font-size:11px;font-weight:700;text-align:center;padding:4px;letter-spacing:0.05em}
</style>

// Charger les lieux custom depuis Supabase
async function fetchLieuxCustom() {
    try {
        var rows = await supaGet("lieux", "order=nom.asc");
        return Array.isArray(rows) ? rows.map(function(r){ return r.nom; }) : [];
    } catch(e) { return []; }
}
async function addLieuCustom(nom) {

function showToast(msg, type) {
    var old = document.querySelectorAll(".toast");
    for(var i=0; i<old.length; i++) old[i].remove();
    var el = document.createElement("div");
    el.className = "toast" + (type === "success" ? " toast-success" : (type === "error" ? " toast-error" : ""));
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(function() { if(el) el.remove(); }, 3000);
}

async function supaGet(table, query) {
    var url = SUPABASE_URL + "/rest/v1/" + table + (query ? "?" + query : "");
    var res = await fetch(url, {
        headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Accept": "application/json"
        }
    });
    var text = await res.text();
    if(!res.ok) throw new Error(text);
    return JSON.parse(text);
}

async function supaPost(table, data) {
    var res = await fetch(SUPABASE_URL + "/rest/v1/" + table, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Prefer": "return=minimal"
        },
        body: JSON.stringify(data)
    });
    var text = await res.text();
    if(!res.ok) throw new Error(text);
    return text ? JSON.parse(text) : {};
}

async function supaPatch(table, id, data) {
    var res = await fetch(SUPABASE_URL + "/rest/v1/" + table + "?id=eq." + id, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Prefer": "return=minimal"
        },
        body: JSON.stringify(data)
    });
    var text = await res.text();
    if(!res.ok) throw new Error(text);
    return {};
}

async function supaDelete(table, id) {
    var res = await fetch(SUPABASE_URL + "/rest/v1/" + table + "?id=eq." + id, {
        method: "DELETE",
        headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY
        }
    });
    if(!res.ok) { var t = await res.text(); throw new Error(t); }
}

async function logMouvement(data) {
    // Ne bloque jamais l'action principale si ça échoue
    try {
        await supaPost("mouvements", data);
    } catch(e) { console.warn("Log mouvement échoué:", e.message); }
}

    try { localStorage.setItem(CACHE_KEY, JSON.stringify({ts: Date.now(), data: produits})); } catch(e) {}
}
function loadCache() {
    try { var c = JSON.parse(localStorage.getItem(CACHE_KEY)||"null"); return c ? c.data : []; } catch(e) { return []; }
}
function isOnline() { return navigator.onLine !== false; }

function formatDate(iso) {
    if(!iso) return "";
    var d = new Date(iso);
    var now = new Date();
    var diff = Math.floor((now - d) / 1000);
    if(diff < 60) return "À l'instant";
    if(diff < 3600) return Math.floor(diff/60) + " min";
    if(diff < 86400) return Math.floor(diff/3600) + " h";
    if(diff < 604800) return Math.floor(diff/86400) + " j";
    return d.toLocaleDateString("fr-FR", {day:"2-digit", month:"2-digit"});
}

async function analyzeImageWithClaude(base64Data, mediaType) {
    if(!ANTHROPIC_KEY) throw new Error("Cle Anthropic non configuree");
    var res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "x-api-key": ANTHROPIC_KEY,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-ipc": "true"
        },
        body: JSON.stringify({
            model: "claude-opus-4-20250514",
            max_tokens: 400,
            messages: [{
                role: "user",
                content: [
                    {type: "image", source: {type: "base64", media_type: mediaType, data: base64Data}},
                    {type: "text", text: "Identifie ce produit de construction/renovation. Reponds UNIQUEMENT en JSON valide (sans markdown, sans texte avant/apres): {\"nom\": \"nom commercial court\", \"famille\": \"MATERIAUX\" ou \"OUTILLAGE\", \"corps_etat\": \"un parmi: Maconnerie/Demolition/Terrassement/Beton/Charpente/Couverture/Platrerie/Peinture/Menuiserie/Carrelage/Electricite/Plomberie/Isolation/Sols/Quincaillerie/Consommables/Finitions/Securite/Nettoyage/Divers\", \"unite\": \"un parmi: piece/boite/sac/rouleau/cartouche/litre/m2/ml/kg\"}"}
                ]
            }]
        })
    });
    if(!res.ok) { var t = await res.text(); throw new Error("Erreur API: " + res.status + " " + t.slice(0,100)); }
    var data = await res.json();
    var text = data.content.map(function(c){ return c.text || ""; }).join("");
    text = text.replace(/```json|```/g, "").trim();
    return JSON.parse(text);
}

async function uploadPhoto(file, name) {
    var ext = file.name ? file.name.split(".").pop() : "jpg";
    var path = name.replace(/[^a-z0-9]/gi, "_").slice(0,20) + "-" + Date.now() + "." + ext;
    var res = await fetch(SUPABASE_URL + "/storage/v1/object/product-photos/" + path, {
        method: "POST",
        headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Content-Type": file.type || "image/jpeg"
        },
        body: file
    });
    if(!res.ok) throw new Error("Upload failed");
    return SUPABASE_URL + "/storage/v1/object/public/product-photos/" + path;
}


// Calcul statut selon famille : outillage = jamais "stock bas", seulement rupture
function getStatut(p) {
    if((p.quantite||0) <= 0) return "out";
    if(p.famille === "OUTILLAGE") return "ok";   // 1 outil = OK
    if((p.quantite||0) <= (p.quantite_min||0)) return "low";
    return "ok";
}

// LoginScreen
function LoginScreen(props) {
    var codeState = useState("");
    var code = codeState[0];
    var setCode = codeState[1];
    var errState = useState("");
    var err = errState[0];
    var setErr = errState[1];
    var loadingState = useState(false);
    var loading = loadingState[0];
    var setLoading = loadingState[1];
    var rememberState = useState(false);
    var rememberMe = rememberState[0];
    var setRememberMe = rememberState[1];

    useEffect(function() {
        var saved = localStorage.getItem("lrb_remembered_code");
        if(saved) {
            setCode(saved);
            setRememberMe(true);
        }
    }, []);

    async function doLogin() {
        if(code.length < 4) return;
        setLoading(true);
        setErr("");
        var userFound = null;
        // 1. Essai Supabase
        try {
            var rows = await supaGet("utilisateurs", "code=eq." + code + "&limit=1");
            if(rows && rows.length > 0 && rows[0].nom) {
                userFound = {code: code, name: rows[0].nom, role: rows[0].role || "chantier"};
            }
        } catch(e) {}
        // 2. Fallback USERS_LOCAL si Supabase n'a rien donné
        if(!userFound && USERS_LOCAL[code]) {
            userFound = Object.assign({code: code}, USERS_LOCAL[code]);
        }
        if(userFound) {
            if(rememberMe) localStorage.setItem("lrb_remembered_code", code);
            else localStorage.removeItem("lrb_remembered_code");
            props.onLogin(userFound);
        } else {
            setErr("Code incorrect — vérifie le code saisi");
        }
        setLoading(false);
    }

    return h("div", {className:"login-wrap"},
        h("div", {className:"login-card"},
            h("img", {src:LRB_LOGO, className:"login-logo"}),
            h("div", {className:"login-title"}, "STOCK"),
            h("label", {className:"input-label"}, "Code utilisateur"),
            h("input", {
                className:"input input-code",
                type:"tel",
                maxLength:6,
                placeholder:"xxxxxx",
                value:code,
                onChange:function(e){setCode(e.target.value); setErr("");},
                onKeyDown:function(e){if(e.key==="Enter") doLogin();}
            }),
            err ? h("div", {style:{color:"var(--red)", fontSize:12, marginBottom:12}}, err) : null,
            h("div", {className:"checkbox-group"},
                h("input", {type:"checkbox", id:"rememberMe", checked:rememberMe, onChange:function(e){setRememberMe(e.target.checked);}}),
                h("label", {htmlFor:"rememberMe"}, "Se souvenir de moi")
            ),
            h("button", {className:"btn btn-navy btn-full", onClick:doLogin, disabled:loading || code.length<4}, loading ? "..." : "Connexion")
        )
    );
}

    async function sortir() {
        var q = parseFloat(qty);
        if(!q || q<=0) return;
        var avant = p.quantite||0;
        var apres = Math.max(0, avant - q);
        try {
            await supaPatch("produits", p.id, {quantite: apres});
            await logMouvement({produit_id:p.id, produit_nom:p.nom, type:"sortie", quantite:q, quantite_avant:avant, quantite_apres:apres, user_id:props.user.code, user_nom:props.user.name, chantier: chantier.trim() || null});

            setQty(""); setChantier(""); props.onRefresh(); props.onBack();
        } catch(e) { showToast("Erreur: " + e.message, "error"); }

        var q = parseFloat(add);
        if(!q || q<=0) return;
        var avant = p.quantite||0;
        var apres = avant + q;
        try {
            await supaPatch("produits", p.id, {quantite: apres});
            await logMouvement({produit_id:p.id, produit_nom:p.nom, type:"entree", quantite:q, quantite_avant:avant, quantite_apres:apres, user_id:props.user.code, user_nom:props.user.name});

function PhotoScreen(props) {
    var stepState = useState("capture");
    var scannerState = useState(false);
    var scanning = scannerState[0]; var setScanning = scannerState[1];
    var videoRef = useRef(null);
    var streamRef = useRef(null);
    var step = stepState[0];
    var setStep = stepState[1];
    var previewState = useState(null);
    var preview = previewState[0];
    var setPreview = previewState[1];
    var imgFileState = useState(null);
    var imgFile = imgFileState[0];
    var setImgFile = imgFileState[1];
    var resultState = useState(null);
    var result = resultState[0];
    var setResult = resultState[1];
    var qtyState = useState("");
    var qty = qtyState[0];
    var setQty = qtyState[1];
    var savingState = useState(false);
    var saving = savingState[0];
    var setSaving = savingState[1];
    var fileRef = useRef(null);
    
    function handleFile(e) {
        var file = e.target.files[0];
        if(!file) return;
        setImgFile(file);
        var reader = new FileReader();
        reader.onload = function(ev) {
            var dataUrl = ev.target.result;
            setPreview(dataUrl);
            setStep("analyzing");
            // Extraire base64 et mediaType
            var parts = dataUrl.split(",");
            var meta = parts[0]; // "data:image/jpeg;base64"
            var base64 = parts[1];
            var mediaType = meta.replace("data:","").replace(";base64","") || "image/jpeg";
            analyzeImageWithClaude(base64, mediaType).then(function(res) {
                setResult({
                    nom: res.nom || "",
                    famille: res.famille || "MATERIAUX",
                    corps_etat: res.corps_etat || "",
                    unite: res.unite || "piece"
                });
                setQty("1");
                setStep("result");
            }).catch(function(err) {
                // Fallback saisie manuelle si pas de cle ou erreur
                showToast("IA indisponible — saisie manuelle", "error");
                setResult({nom:"", famille:"MATERIAUX", corps_etat:"", unite:"piece"});
                setQty("1");
                setStep("result");
            });
        };
        reader.readAsDataURL(file);
    }
    
    function handleManualEntry() {
        setStep("result");
        setResult({nom:"", famille:"MATERIAUX", corps_etat:"", unite:"piece"});
        setQty("1");
        setImgFile(null);
        setPreview(null);
    }
    
    function handleSave() {
        setSaving(true);
        var photoP = imgFile ? uploadPhoto(imgFile, (result.nom || "produit").replace(/[^a-z0-9]/gi, "_").slice(0,15)) : Promise.resolve(null);
        photoP.then(function(pu) {
            return supaPost("produits", {
                nom: result.nom,
                famille: result.famille,
                corps_etat: result.corps_etat,
                sous_famille: result.sous_famille || null,
                unite: result.unite || "piece",
                quantite: parseFloat(qty) || 1,
                photo_url: pu,
                user_id: props.user.code
            });
        }).then(function(newProduit) {
            return logMouvement({
                produit_nom: result.nom,
                type: "creation",
                quantite: parseFloat(qty) || 1,
                quantite_avant: 0,
                quantite_apres: parseFloat(qty) || 1,
                user_id: props.user.code,
                user_nom: props.user.name
            });
        }).then(function() {
            showToast("Produit enregistre !", "success");
            if(props.onRefresh) props.onRefresh();
            props.onBack();
        }).catch(function(err) {
            showToast("Erreur: " + err.message, "error");
            setSaving(false);
        });
    }
    
    function reset() {
        setStep("capture");
        setResult(null);
        setImgFile(null);
        setPreview(null);
    }
    
    if(step === "capture") {
        return h("div", {className:"screen"},
            h("div", {className:"header"},
                h("button", {className:"header-back", onClick:props.onBack}, "←"),
                h("div", null, h("div", {className:"header-title"}, "📷 Photo IA"), h("div", {className:"header-sub"}, "Identification automatique"))
            ),
            h("div", {style:{background:"var(--surface2)", border:"2px dashed var(--border)", borderRadius:20, padding:"36px 24px", textAlign:"center", marginTop:16}},
                h("div", {style:{fontSize:64, marginBottom:14}}, "📷"),
                h("div", {style:{fontSize:16, fontWeight:700, color:"var(--navy)", marginBottom:8}}, "Prenez une photo du produit"),
                h("div", {className:"text-muted", style:{marginBottom:24}}, "L'IA identifie le produit"),
                h("input", {ref:fileRef, type:"file", accept:"image/*", capture:"environment", style:{display:"none"}, onChange:handleFile}),
                h("button", {className:"btn btn-navy btn-full", style:{marginBottom:10}, onClick:function(){if(fileRef.current) fileRef.current.click();}}, "📷 Prendre une photo"),
                h("button", {className:"btn btn-outline btn-full", onClick:function(){if(fileRef.current){fileRef.current.removeAttribute("capture"); fileRef.current.click();}}}, "📁 Depuis la galerie"),
                h("button", {className:"btn btn-outline btn-full", style:{marginTop:10}, onClick:async function(){
                    if(!("BarcodeDetector" in window)){ showToast("Scanner non supporté sur ce navigateur", "error"); return; }
                    var stream;
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                        var video = document.createElement("video");
                        video.srcObject = stream; video.play();
                        var detector = new BarcodeDetector({formats:["ean_13","ean_8","code_128","qr_code"]});
                        var found = false;
                        var tries = 0;
                        var interval = setInterval(async function(){
                            tries++;
                            if(tries > 40){ clearInterval(interval); stream.getTracks().forEach(function(t){t.stop();}); showToast("Code-barres non détecté", "error"); return; }
                            try {
                                var codes = await detector.detect(video);
                                if(codes.length > 0){
                                    clearInterval(interval);
                                    stream.getTracks().forEach(function(t){t.stop();});
                                    found = true;
                                    var code = codes[0].rawValue;
                                    showToast("Code détecté : " + code, "success");
                                    setStep("result");
                                    setResult({nom:"Code " + code, famille:"MATERIAUX", corps_etat:"", unite:"piece"});
                                    setQty("1");
                                }
                            } catch(e){}
                        }, 250);
                    } catch(e){ if(stream) stream.getTracks().forEach(function(t){t.stop();}); showToast("Caméra inaccessible", "error"); }
                }}, "📷 Scanner code-barres"),
                h("button", {className:"btn btn-outline btn-full", style:{marginTop:10}, onClick:handleManualEntry}, "⌨️ Saisie Manuelle")
            )
        );
    }
    
    if(step === "analyzing") {
        return h("div", {className:"screen"},
            h("div", {className:"header"},
                h("button", {className:"header-back", onClick:props.onBack}, "←"),
                h("div", null, h("div", {className:"header-title"}, "Analyse en cours..."))
            ),
            preview ? h("img", {src:preview, style:{width:"100%", maxHeight:220, objectFit:"cover", borderRadius:16, marginTop:16}}) : null,
            h("div", {style:{textAlign:"center", marginTop:32}},
                h("div", {className:"spinner"}),
                h("div", {style:{fontWeight:700, color:"var(--navy)", fontSize:16, marginTop:16}}, "L'IA analyse le produit...")
            )
        );
    }
    
    if(step === "result" && result) {
        function upd(k) {
            return function(e) {
                var v = e.target.value;
                setResult(function(r) { var n = Object.assign({}, r); n[k] = v; return n; });
            };
        }
        return h("div", {className:"screen"},
            h("div", {className:"header"},
                h("button", {className:"header-back", onClick:reset}, "←"),
                h("div", null, h("div", {className:"header-title"}, "Produit identifie"), h("div", {className:"header-sub"}, "Verifiez avant de valider"))
            ),
            preview ? h("img", {src:preview, style:{width:"100%", height:180, objectFit:"cover", borderRadius:16, marginBottom:14}}) : null,
            h("div", {className:"space-y"},
                h("div", {className:"input-group"},
                    h("label", {className:"input-label"}, "Nom du produit *"),
                    h("input", {className:"input", value:result.nom || "", onChange:upd("nom")})
                ),
                h("div", {className:"grid-2"},
                    h("div", {className:"input-group"},
                        h("label", {className:"input-label"}, "Famille"),
                        h("select", {className:"select", value:result.famille || "MATERIAUX", onChange:upd("famille")},
                            h("option", null, "MATERIAUX"),
                            h("option", null, "OUTILLAGE")
                        )
                    ),
                    h("div", {className:"input-group"},
                        h("label", {className:"input-label"}, "Corps d'etat"),
                        h("select", {className:"select", value:result.corps_etat || "", onChange:upd("corps_etat")},
                            h("option", {value:""}, "— Choisir —"),
                            CORPS_ETAT_GROS.concat(CORPS_ETAT_SECOND).map(function(ce){
                                return h("option", {key:ce.id, value:ce.label}, ce.icon + " " + ce.label);

                    h("label", {className:"input-label"}, "Sous-famille"),
                    h("select", {className:"select", value:result.sous_famille || "", onChange:upd("sous_famille")},
                        h("option", {value:""}, "— Non classé —"),
                        (SOUS_FAMILLES[result.corps_etat] || []).map(function(sf){
                            return h("option", {key:sf, value:sf}, sf);
                        })
                    )
                ) : null,
                h("div", {className:"grid-2"},
                    h("div", {className:"input-group"},
                        h("label", {className:"input-label"}, "Quantite *"),
                        h("input", {className:"input", type:"number", value:qty, onChange:function(e){setQty(e.target.value);}})
                    ),
                    h("div", {className:"input-group"},

    }
    return null;

function AchatScreen(props) {
    var nomState = useState(""); var nom = nomState[0]; var setNom = nomState[1];
    var qtyState = useState(""); var qty = qtyState[0]; var setQty = qtyState[1];
    var uniteState = useState("piece"); var unite = uniteState[0]; var setUnite = uniteState[1];
    var noteState = useState(""); var note = noteState[0]; var setNote = noteState[1];
    var loadingState = useState(false); var loading = loadingState[0]; var setLoading = loadingState[1];
    var achatsState = useState([]); var achats = achatsState[0]; var setAchats = achatsState[1];
    var showFormState = useState(false); var showForm = showFormState[0]; var setShowForm = showFormState[1];

    function loadAchats() {
        supaGet("achats", "order=created_at.desc&limit=30").then(function(r){ setAchats(Array.isArray(r)?r:[]); }).catch(function(){});
    }
    useEffect(function(){ loadAchats(); }, []);

    async function create() {
        if(!nom || !qty) return;
        setLoading(true);
        try {
            await supaPost("achats", {nom:nom, quantite:parseFloat(qty), unite:unite, commentaire:note, user_id:props.user.code, statut:"en_attente"});
            showToast("✅ Achat créé", "success");
            setNom(""); setQty(""); setNote(""); setUnite("piece"); setShowForm(false);
            loadAchats();
        } catch(e) { showToast("❌ Erreur: " + e.message, "error"); }
        setLoading(false);
    }

    var recuModalState = useState(null); // {achat}
    var recuModal = recuModalState[0]; var setRecuModal = recuModalState[1];
    var recuProduitState = useState(null); // produit trouvé
    var recuProduit = recuProduitState[0]; var setRecuProduit = recuProduitState[1];
    var recuQtyState = useState(""); var recuQty = recuQtyState[0]; var setRecuQty = recuQtyState[1];
    var recuLoadingState = useState(false); var recuLoading = recuLoadingState[0]; var setRecuLoading = recuLoadingState[1];

    async function changeStatut(id, statut, achat) {
        try {
            await supaPatch("achats", id, {statut: statut});
            loadAchats();
            if(statut === "recu") {
                // Chercher le produit correspondant
                var matches = (props.produits || []).filter(function(p){
                    return (p.nom||"").toLowerCase().includes((achat.nom||"").toLowerCase().slice(0,6))
                        || (achat.nom||"").toLowerCase().includes((p.nom||"").toLowerCase().slice(0,6));
                });
                setRecuProduit(matches.length === 1 ? matches[0] : null);
                setRecuQty(String(achat.quantite || ""));
                setRecuModal(achat);
            }
        } catch(e) { showToast("Erreur: " + e.message, "error"); }
    }

    async function validerEntreeStock() {
        var q = parseFloat(recuQty);
        if(!q || !recuProduit) { setRecuModal(null); return; }
        setRecuLoading(true);
        try {
            var avant = recuProduit.quantite || 0;
            var apres = avant + q;
            await supaPatch("produits", recuProduit.id, {quantite: apres});
            await logMouvement({produit_id:recuProduit.id, produit_nom:recuProduit.nom, type:"entree", quantite:q, quantite_avant:avant, quantite_apres:apres, user_id:props.user.code, user_nom:props.user.name});
            showToast("✅ " + q + " " + (recuProduit.unite||"pièce") + " ajouté(s) au stock", "success");

// ExportScreen — Export CSV du stock
function ExportScreen(props) {
    var produits = props.produits || [];
    var exportingState = useState(false);
    var exporting = exportingState[0]; var setExporting = exportingState[1];

    function exportCSV() {
        setExporting(true);
        var headers = ["Nom","Famille","Corps d'état","Sous-famille","Quantite","Unite","Emplacement","Fournisseur","Reference","Prix HT","Seuil alerte","Statut"];
        var rows = produits.map(function(p) {
            var statut = getStatut(p) === "ok" ? "OK" : getStatut(p) === "low" ? "Stock bas" : "Rupture";
            return [
                p.nom||"", p.famille||"", p.corps_etat||"", p.sous_famille||"",
                p.quantite||0, p.unite||"piece", p.emplacement||"",
                p.fournisseur||"", p.reference||"",
                p.prix_unitaire ? String(p.prix_unitaire).replace(".",",") : "",
                p.quantite_min||0, statut
            ].map(function(v){ return '"' + String(v).replace(/"/g,'""') + '"'; }).join(";");
        });
        var csv = "\uFEFF" + headers.map(function(h){ return '"'+h+'"'; }).join(";") + "\n" + rows.join("\n");
        var blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url; a.download = "LRB_Stock_" + new Date().toISOString().slice(0,10) + ".csv";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setExporting(false);
        showToast("✅ Export téléchargé — " + produits.length + " articles", "success");
    }

    var valeurTotale = produits.reduce(function(s,p){ return s + ((p.quantite||0)*(p.prix_unitaire||0)); },0);
    var nbRuptures = produits.filter(function(p){ return getStatut(p) === "out"; }).length;
    var nbBas = produits.filter(function(p){ return getStatut(p) === "low"; }).length;

    return h("div", {className:"screen"},
        h("div", {className:"header"},
            h("button", {className:"header-back", onClick:props.onBack}, "←"),
            h("div", null, h("div", {className:"header-title"}, "📤 Export CSV"), h("div", {className:"header-sub"}, produits.length + " articles"))
        ),
        h("div", {className:"card space-y", style:{marginBottom:14}},
            h("div", {className:"section-title"}, "CONTENU DE L'EXPORT"),
            h("div", {style:{fontSize:13, color:"var(--text2)", lineHeight:1.8}},
                "✅ " + produits.length + " références au total", h("br"),
                "❌ " + nbRuptures + " rupture(s)", h("br"),
                "⚠️ " + nbBas + " stock(s) bas", h("br"),
                valeurTotale > 0 ? "💶 Valeur totale : " + valeurTotale.toFixed(2) + " € HT" : "💶 Prix non renseignés"
            )
        ),
        h("div", {className:"card space-y", style:{marginBottom:14}},
            h("div", {className:"section-title"}, "COLONNES EXPORTÉES"),
            h("div", {style:{fontSize:12, color:"var(--text3)", lineHeight:2}},
                "Nom · Famille · Corps d'état · Sous-famille · Quantité · Unité · Emplacement · Fournisseur · Référence · Prix HT · Seuil alerte · Statut"
            )
        ),
        h("button", {className:"btn btn-navy btn-full", onClick:exportCSV, disabled:exporting},
            exporting ? "Génération..." : "⬇️ Télécharger le fichier CSV"
        ),
        h("div", {style:{fontSize:11, color:"var(--text3)", textAlign:"center", marginTop:10}},
            "Compatible Excel, Google Sheets, LibreOffice"
        )
    );
}

function BonSortieScreen(props) {
    var produits = props.produits || [];
    var chantierState = useState(""); var chantier = chantierState[0]; var setChantier = chantierState[1];
    var searchState = useState(""); var search = searchState[0]; var setSearch = searchState[1];
    var lignesState = useState({}); var lignes = lignesState[0]; var setLignes = lignesState[1];
    var savingState = useState(false); var saving = savingState[0]; var setSaving = savingState[1];
    var previewState = useState(false); var preview = previewState[0]; var setPreview = previewState[1];

    var filtered = search.length >= 2 ? produits.filter(function(p){
        return (p.nom||"").toLowerCase().includes(search.toLowerCase());
    }).slice(0,10) : [];

    var lignesArray = Object.keys(lignes).map(function(id){
        var p = produits.find(function(x){ return String(x.id) === String(id); });
        return p ? {p:p, qty:lignes[id]} : null;
    }).filter(Boolean).filter(function(l){ return l.qty > 0; });

    function setLigne(id, qty) {
        var nl = Object.assign({}, lignes);
        if(!qty || parseFloat(qty) <= 0) delete nl[id];
        else nl[id] = parseFloat(qty);
        setLignes(nl);
    }

    async function validerBon() {
        if(!chantier.trim() || lignesArray.length === 0) return;
        setSaving(true);
        try {
            for(var i=0; i<lignesArray.length; i++) {
                var l = lignesArray[i];
                var avant = l.p.quantite||0;
                var apres = Math.max(0, avant - l.qty);
                await supaPatch("produits", l.p.id, {quantite: apres});
                await logMouvement({produit_id:l.p.id, produit_nom:l.p.nom, type:"sortie", quantite:l.qty, quantite_avant:avant, quantite_apres:apres, user_id:props.user.code, user_nom:props.user.name, chantier:chantier.trim()});
            }
            showToast("✅ Bon de sortie validé — " + lignesArray.length + " articles sortis", "success");
            props.onRefresh();
            setLignes({}); setChantier(""); setSearch(""); setPreview(false);
        } catch(e) { showToast("Erreur: " + e.message, "error"); }
        setSaving(false);

    function partagerWhatsApp() {
        var txt = "📋 *BON DE SORTIE — LRB*\n";

        txt += "👷 " + props.user.name + " · " + new Date().toLocaleDateString("fr-FR") + "\n\n";
        lignesArray.forEach(function(l){
            txt += "• " + l.p.nom + " : *" + l.qty + " " + (l.p.unite||"pce") + "*\n";
        });
        txt += "\n— Les Rénovateurs Bretons";
        window.open("https://wa.me/?text=" + encodeURIComponent(txt), "_blank");

        h("div", {className:"header"},

            filtered.map(function(p) {
                return h("div", {key:p.id, className:"search-result-item", onClick:function(){
                    if(!lignes[p.id]) setLigne(p.id, 1);

function ImportCSVScreen(props) {
    var fileState = useState(null); var file = fileState[0]; var setFile = fileState[1];
    var rowsState = useState([]); var rows = rowsState[0]; var setRows = rowsState[1];
    var headersState = useState([]); var headers = headersState[0]; var setHeaders = headersState[1];
    var mappingState = useState({}); var mapping = mappingState[0]; var setMapping = mappingState[1];
    var importingState = useState(false); var importing = importingState[0]; var setImporting = importingState[1];
    var resultState = useState(null); var result = resultState[0]; var setResult = resultState[1];
    var fileRef = useRef(null);

    var CHAMPS = [
        {id:"nom",label:"Nom *"},{id:"quantite",label:"Quantité"},{id:"unite",label:"Unité"},
        {id:"corps_etat",label:"Corps d'état"},{id:"famille",label:"Famille"},
        {id:"sous_famille",label:"Sous-famille"},{id:"emplacement",label:"Emplacement"},
        {id:"fournisseur",label:"Fournisseur"},{id:"reference",label:"Référence"},
        {id:"prix_unitaire",label:"Prix HT"},{id:"quantite_min",label:"Seuil alerte"}
    ];

    function parseCSV(text) {
        var sep = text.includes(";") ? ";" : ",";
        var lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
        if(lines.length < 2) return;
        var hdrs = lines[0].split(sep).map(function(h){ return h.replace(/^"|"$/g,"").trim(); });
        setHeaders(hdrs);
        var data = lines.slice(1,51).map(function(line){
            var cols = line.split(sep).map(function(v){ return v.replace(/^"|"$/g,"").trim(); });
            var obj = {};
            hdrs.forEach(function(h,i){ obj[h] = cols[i]||""; });
            return obj;
        });
        setRows(data);
        var autoMap = {};
        hdrs.forEach(function(h){
            var hl = h.toLowerCase();
            if(hl.includes("nom")) autoMap["nom"]=h;
            else if(hl.includes("qté")||hl.includes("quantit")) autoMap["quantite"]=h;
            else if(hl.includes("unit")) autoMap["unite"]=h;
            else if(hl.includes("corps")) autoMap["corps_etat"]=h;
            else if(hl.includes("sous")) autoMap["sous_famille"]=h;
            else if(hl.includes("famil")) autoMap["famille"]=h;
            else if(hl.includes("empla")) autoMap["emplacement"]=h;
            else if(hl.includes("fourn")) autoMap["fournisseur"]=h;
            else if(hl.includes("ref")) autoMap["reference"]=h;
            else if(hl.includes("prix")) autoMap["prix_unitaire"]=h;
            else if(hl.includes("seuil")||hl.includes("min")) autoMap["quantite_min"]=h;
        });
        setMapping(autoMap);
    }

    function handleFile(e) {
        var f = e.target.files[0];
        if(!f) return;
        setFile(f); setRows([]); setHeaders([]); setMapping({}); setResult(null);
        var reader = new FileReader();
        reader.onload = function(ev){ parseCSV(ev.target.result); };
        reader.readAsText(f,"UTF-8");
    }

    async function doImport() {
        if(!mapping["nom"]||rows.length===0) return;
        setImporting(true);
        var ok=0; var err=0;
        for(var i=0;i<rows.length;i++){
            var row=rows[i];
            var nom=row[mapping["nom"]];
            if(!nom){err++;continue;}
            try{
                var obj={nom:nom,famille:"MATERIAUX"};
                ["quantite","prix_unitaire","quantite_min"].forEach(function(f){
                    if(mapping[f]&&row[mapping[f]]) obj[f]=parseFloat(row[mapping[f]].replace(",","."))||0;
                });
                ["unite","corps_etat","famille","sous_famille","emplacement","fournisseur","reference"].forEach(function(f){
                    if(mapping[f]&&row[mapping[f]]) obj[f]=row[mapping[f]];
                });
                await supaPost("produits",obj);
                ok++;
            }catch(e){err++;}
        }
        setImporting(false);
        setResult({ok:ok,err:err});
        if(ok>0) props.onRefresh();
        showToast("✅ "+ok+" importé(s)"+(err>0?" · "+err+" erreur(s)":""),ok>0?"success":"error");
    }

    return h("div",{className:"screen"},
        h("div",{className:"header"},
            h("button",{className:"header-back",onClick:props.onBack},"←"),
            h("div",null,h("div",{className:"header-title"},"📥 Import CSV"),
                h("div",{className:"header-sub"},rows.length>0?rows.length+" lignes":"Importer un inventaire"))
        ),
        result ? h("div",{className:"card",style:{marginBottom:14,textAlign:"center"}},
            h("div",{style:{fontSize:22,fontWeight:900,color:result.err===0?"var(--green)":"var(--orange)"}},
                result.ok+" importé(s)"+(result.err>0?" · "+result.err+" erreur(s)":"")),
            h("button",{className:"btn btn-outline btn-full",style:{marginTop:12},onClick:function(){setResult(null);setRows([]);setFile(null);}}, "Nouvel import")
        ) : null,
        !result ? h("div",null,
            h("input",{ref:fileRef,type:"file",accept:".csv,.txt",style:{display:"none"},onChange:handleFile}),
            rows.length===0 ? h("div",{className:"import-zone",onClick:function(){fileRef.current&&fileRef.current.click();}},
                h("div",{style:{fontSize:48,marginBottom:12}},"📄"),
                h("div",{style:{fontSize:16,fontWeight:700,color:"var(--navy)",marginBottom:8}},"Charger un fichier CSV"),
                h("div",{style:{fontSize:12,color:"var(--text3)"}},"Séparateur ; ou , · UTF-8 · Excel compatible")
            ) : null,
            rows.length>0 ? h("div",null,
                h("div",{className:"card",style:{marginBottom:12}},
                    h("div",{className:"section-title"},"MAPPING DES COLONNES"),
                    h("div",{style:{fontSize:11,color:"var(--text3)",marginBottom:10}},"Associe chaque champ à la colonne de ton fichier"),
                    CHAMPS.map(function(ch){
                        return h("div",{key:ch.id,className:"import-col-row"},
                            h("div",{style:{flex:1,fontWeight:700,color:"var(--navy)"}},[ch.label]),
                            h("select",{style:{flex:1,padding:"4px 8px",borderRadius:8,border:"1.5px solid var(--border)",fontSize:12,fontFamily:"inherit"},
                                value:mapping[ch.id]||"",
                                onChange:function(e){ var nm=Object.assign({},mapping); nm[ch.id]=e.target.value; setMapping(nm); }
                            },
                                h("option",{value:""},"— Ignorer —"),
                                headers.map(function(hh){ return h("option",{key:hh,value:hh},hh); })
                            )
                        );
                    })
                ),
                h("div",{className:"card",style:{marginBottom:12}},
                    h("div",{className:"section-title"},"APERÇU (5 PREMIÈRES LIGNES)"),
                    rows.slice(0,5).map(function(row,i){
                        return h("div",{key:i,style:{fontSize:12,padding:"6px 0",borderBottom:"1px solid var(--border)",color:"var(--text2)"}},
                            (row[mapping["nom"]]||"?") + (row[mapping["quantite"]]?" — "+row[mapping["quantite"]]+" "+(row[mapping["unite"]]||""):"")
                        );
                    })
                ),
                h("button",{className:"btn btn-navy btn-full",onClick:doImport,disabled:!mapping["nom"]||importing},
                    importing?"Import en cours...":"⬇️ Importer "+rows.length+" articles")
            ) : null
        ) : null
    );
}

// InventaireScreen
function InventaireScreen(props) {
    var produits = props.produits || [];
    var searchState = useState(""); var search = searchState[0]; var setSearch = searchState[1];
    var valeursState = useState({}); var valeurs = valeursState[0]; var setValeurs = valeursState[1];
    var savingState = useState(false); var saving = savingState[0]; var setSaving = savingState[1];

    var list = produits.filter(function(p){
        if(!search) return true;
        return (p.nom||"").toLowerCase().includes(search.toLowerCase());
    });

    function setVal(id, v) {
        var nv = Object.assign({}, valeurs);
        nv[id] = v;
        setValeurs(nv);
    }

    var nbModif = Object.keys(valeurs).filter(function(id){
        var p = produits.find(function(x){ return String(x.id) === String(id); });
        return p && valeurs[id] !== "" && parseFloat(valeurs[id]) !== (p.quantite||0);
    }).length;

    async function validerInventaire() {
        setSaving(true);
        var errors = 0;
        var updates = Object.keys(valeurs).filter(function(id){
            var p = produits.find(function(x){ return String(x.id) === String(id); });
            return p && valeurs[id] !== "" && parseFloat(valeurs[id]) !== (p.quantite||0);
        });
        for(var i = 0; i < updates.length; i++) {
            var id = updates[i];
            var p = produits.find(function(x){ return String(x.id) === String(id); });
            var newQty = parseFloat(valeurs[id]);
            try {
                await supaPatch("produits", id, {quantite: newQty});
                await logMouvement({produit_id:id, produit_nom:p.nom, type:"inventaire", quantite:Math.abs(newQty-(p.quantite||0)), quantite_avant:p.quantite||0, quantite_apres:newQty, user_id:props.user.code, user_nom:props.user.name});
            } catch(e) { errors++; }
        }
        setSaving(false);
        if(errors === 0) {
            showToast("✅ Inventaire validé — " + updates.length + " article(s) mis à jour", "success");
            setValeurs({});
            props.onRefresh();
        } else {
            showToast("⚠️ " + errors + " erreur(s) lors de la mise à jour", "error");
        }
    }

    return h("div", {className:"screen"},
        h("div", {className:"header"},
            h("button", {className:"header-back", onClick:props.onBack}, "←"),
            h("div", null,
                h("div", {className:"header-title"}, "📋 Inventaire"),
                h("div", {className:"header-sub"}, nbModif + " modification(s) en attente")
            ),
            nbModif > 0 ? h("button", {
                style:{background:"var(--green)", color:"#fff", border:"none", borderRadius:10, padding:"6px 12px", fontWeight:800, fontSize:12, cursor:"pointer"},
                onClick:validerInventaire, disabled:saving
            }, saving ? "..." : "✅ Valider") : null
        ),
        h("div", {className:"search-box", style:{marginBottom:10}},
            h("span", {style:{color:"var(--text3)"}}, "🔍"),
            h("input", {placeholder:"Filtrer les articles...", value:search, onChange:function(e){setSearch(e.target.value);}})
        ),
        h("div", {style:{fontSize:11, color:"var(--text3)", marginBottom:10, fontWeight:600}},
            "Saisissez la quantité réelle comptée. Laissez vide si inchangé."
        ),
        h("div", {className:"card"},
            list.map(function(p) {
                var val = valeurs[p.id] !== undefined ? valeurs[p.id] : "";
                var diff = val !== "" ? parseFloat(val) - (p.quantite||0) : null;
                return h("div", {key:p.id, className:"invent-row"},
                    h("div", {className:"product-thumb", style:{width:32, height:32, minWidth:32, fontSize:16}},
                        p.photo_url ? h("img", {src:p.photo_url}) : "📦"
                    ),
                    h("div", {style:{flex:1}},
                        h("div", {style:{fontSize:13, fontWeight:700, color:"var(--navy)"}}, p.nom),
                        h("div", {style:{fontSize:11, color:"var(--text3)"}}, (p.corps_etat||"") + " · stock actuel : " + (p.quantite||0) + " " + (p.unite||"pce"))
                    ),
                    diff !== null ? h("div", {className: diff >= 0 ? "invent-diff-pos" : "invent-diff-neg", style:{minWidth:30, textAlign:"center"}},
                        (diff >= 0 ? "+" : "") + diff
                    ) : null,
                    h("input", {
                        className:"invent-input",
                        type:"number", placeholder: String(p.quantite||0),
                        value:val,
                        onChange:function(e){ setVal(p.id, e.target.value); },
                        style:{borderColor: diff !== null ? (diff >= 0 ? "var(--green)" : "var(--red)") : "var(--border)"}
                    })
                );
            })
        )
    );
}

    var basFond  = produits.filter(function(p){ return getStatut(p) === "low"; });
    var ok       = produits.filter(function(p){ return getStatut(p) === "ok"; });

    function ProductRow(p) {
        var statut = getStatut(p);
        return h("div", {key:p.id, className:"product-card product-"+statut, onClick:function(){props.nav("produit", p);}},
            h("div", {className:"product-thumb"},
                p.photo_url ? h("img", {src:p.photo_url}) : h("span", null, "📦")
            ),
            h("div", {style:{flex:1}},
                h("div", {className:"product-name"}, p.nom),
                h("div", {className:"product-meta"}, (p.corps_etat||"") + (p.famille ? " · " + p.famille : "")),
                h("span", {className:"badge badge-"+statut},
                    (statut==="out"?"❌ Rupture":"⚠️ Stock bas") + " — " + (p.quantite||0) + " " + (p.unite||"pièce")
                )
            ),
            h("span", {style:{fontSize:20, marginLeft:4}}, "›")
        );
    }

    function ActRow(m, i) {
        var isEntree = m.type === "entree" || m.type === "creation";
        var iconClass = m.type === "creation" ? "mvt-icon-creation" : (isEntree ? "mvt-icon-entree" : "mvt-icon-sortie");
        var icon = m.type === "creation" ? "🆕" : (isEntree ? "➕" : "➖");
        var qtyColor = isEntree ? "var(--green)" : "var(--orange)";
        return h("div", {key:m.id||i, className:"mvt-row"},
            h("div", {className:"mvt-icon " + iconClass}, icon),
            h("div", {style:{flex:1}},
                h("div", {className:"mvt-nom"}, m.produit_nom || "—"),
                h("div", {className:"mvt-meta"}, (m.user_nom||"") + " · " + formatDate(m.created_at) + (m.chantier ? " · 🏗️ " + m.chantier : ""))
            ),
            h("div", {className:"mvt-qty", style:{color: qtyColor}},
                (isEntree ? "+" : "-") + (m.quantite||0)
            )
        );
    }

    var totalProblemes = ruptures.length + basFond.length;

    return h("div", {className:"screen"},
        h("div", {style:{paddingTop:12}}),

        h("div", {className:"grid-2", style:{gridTemplateColumns:"1fr 1fr 1fr", marginBottom:16}},
            h("div", {className:"card", style:{textAlign:"center", padding:"12px 8px", borderLeft:"3px solid var(--red)"}},
                h("div", {style:{fontSize:24, fontWeight:900, color:"var(--red)"}}, ruptures.length),
                h("div", {style:{fontSize:10, fontWeight:700, color:"var(--text3)", marginTop:2}}, "RUPTURE")
            ),
            h("div", {className:"card", style:{textAlign:"center", padding:"12px 8px", borderLeft:"3px solid var(--orange)"}},
                h("div", {style:{fontSize:24, fontWeight:900, color:"var(--orange)"}}, basFond.length),
                h("div", {style:{fontSize:10, fontWeight:700, color:"var(--text3)", marginTop:2}}, "STOCK BAS")
            ),
            h("div", {className:"card", style:{textAlign:"center", padding:"12px 8px", borderLeft:"3px solid var(--green)"}},
                h("div", {style:{fontSize:24, fontWeight:900, color:"var(--green)"}}, ok.length),
                h("div", {style:{fontSize:10, fontWeight:700, color:"var(--text3)", marginTop:2}}, "OK")
            )
        ),

        totalProblemes === 0
            ? h("div", {className:"empty-state", style:{paddingTop:16, paddingBottom:16}},
                h("div", {className:"empty-state-icon"}, "✅"),
                h("div", {className:"empty-state-text"}, "Tout le stock est au vert !")
              )
            : null,

        ruptures.length > 0
            ? h("div", null,
                h("div", {style:{fontSize:11, fontWeight:800, color:"var(--red)", marginBottom:8, letterSpacing:"0.06em"}}, "❌ RUPTURES (" + ruptures.length + ")"),
                ruptures.map(ProductRow)
              )
            : null,

        basFond.length > 0
            ? h("div", {style:{marginTop: ruptures.length > 0 ? 16 : 0}},
                h("div", {style:{fontSize:11, fontWeight:800, color:"var(--orange)", marginBottom:8, letterSpacing:"0.06em"}}, "⚠️ STOCK BAS (" + basFond.length + ")"),
                basFond.map(ProductRow)
              )
            : null,

        // Fil d'activité global
        h("div", {className:"card", style:{marginTop:20}},
            h("div", {className:"section-title"}, "📋 ACTIVITÉ RÉCENTE"),
            actLoading
                ? h("div", {style:{textAlign:"center", padding:"16px 0"}}, h("div", {className:"spinner", style:{width:24, height:24, borderWidth:2}}))
                : activite.length === 0
                    ? h("div", {style:{textAlign:"center", color:"var(--text3)", fontSize:13, padding:"12px 0"}}, "Aucun mouvement enregistré")
                    : activite.map(ActRow)
        )
    );
}

// ProfilScreen
function UsersScreen(props) {
    var usersState = useState([]); var users = usersState[0]; var setUsers = usersState[1];
    var loadingState = useState(true); var loading = loadingState[0]; var setLoading = loadingState[1];
    var newNomState = useState(""); var newNom = newNomState[0]; var setNewNom = newNomState[1];
    var newCodeState = useState(""); var newCode = newCodeState[0]; var setNewCode = newCodeState[1];
    var newRoleState = useState("chantier"); var newRole = newRoleState[0]; var setNewRole = newRoleState[1];
    var savingState = useState(false); var saving = savingState[0]; var setSaving = savingState[1];

    function loadUsers() {
        setLoading(true);
        supaGet("utilisateurs", "order=nom.asc").then(function(rows){
            setUsers(Array.isArray(rows) ? rows : []);
        }).catch(function(){ setUsers([]); }).finally(function(){ setLoading(false); });
    }
    useEffect(function(){ loadUsers(); }, []);

    async function addUser() {
        if(!newNom.trim() || newCode.length < 4) return;
        setSaving(true);
        try {
            await supaPost("utilisateurs", {nom: newNom.trim(), code: newCode, role: newRole});
            showToast("✅ Utilisateur ajouté", "success");
            setNewNom(""); setNewCode(""); setNewRole("chantier");
            loadUsers();
        } catch(e) { showToast("Erreur: " + e.message, "error"); }
        setSaving(false);
    }

    async function deleteUser(id, nom) {
        if(!window.confirm("Supprimer " + nom + " ?")) return;
        try {
            await supaDelete("utilisateurs", id);
            showToast("🗑️ Utilisateur supprimé", "success");
            loadUsers();
        } catch(e) { showToast("Erreur: " + e.message, "error"); }
    }

    return h("div", {className:"screen"},
        h("div", {className:"header"},
            h("button", {className:"header-back", onClick:props.onBack}, "←"),
            h("div", null, h("div", {className:"header-title"}, "👥 Utilisateurs"), h("div", {className:"header-sub"}, users.length + " compte(s)"))
        ),
        h("div", {className:"card space-y", style:{marginBottom:16}},
            h("div", {className:"section-title"}, "➕ AJOUTER UN UTILISATEUR"),
            h("div", {className:"input-group"},
                h("label", {className:"input-label"}, "Prénom / Nom *"),
                h("input", {className:"input", placeholder:"Ex: David Martin", value:newNom, onChange:function(e){setNewNom(e.target.value);}})
            ),
            h("div", {className:"grid-2"},
                h("div", {className:"input-group"},
                    h("label", {className:"input-label"}, "Code (4-6 chiffres) *"),
                    h("input", {className:"input", type:"tel", maxLength:6, placeholder:"123456", value:newCode, onChange:function(e){setNewCode(e.target.value);}})
                ),
                h("div", {className:"input-group"},
                    h("label", {className:"input-label"}, "Rôle"),
                    h("select", {className:"select", value:newRole, onChange:function(e){setNewRole(e.target.value);}},
                        h("option", {value:"chantier"}, "👷 Équipe terrain"),
                        h("option", {value:"admin"}, "⚙️ Administrateur")
                    )
                )
            ),
            h("button", {className:"btn btn-navy btn-full", onClick:addUser, disabled:!newNom.trim()||newCode.length<4||saving}, saving ? "..." : "✅ Créer l'utilisateur")
        ),
        loading ? h("div", {style:{textAlign:"center", padding:24}}, h("div", {className:"spinner", style:{width:28, height:28, borderWidth:3}})) : null,
        users.map(function(u) {
            return h("div", {key:u.id, className:"user-row"},
                h("div", {className:"user-code"}, u.code),
                h("div", {style:{flex:1}},
                    h("div", {style:{fontSize:14, fontWeight:800, color:"var(--navy)"}}, u.nom),
                    h("div", {style:{fontSize:11, color:"var(--text3)"}}, u.role === "admin" ? "⚙️ Administrateur" : "👷 Terrain")
                ),
                h("button", {className:"btn btn-danger btn-sm", onClick:function(){deleteUser(u.id, u.nom);}}, "🗑️")
            );
        })
    );
}
